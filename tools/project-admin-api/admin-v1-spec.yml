          type: string

    get:
      description: Proxies a GET request through to the underlying Elasticsearch instance.
      summary: Proxy GET request to Elasticsearch
      operationId: adminProxyElasticsearchProjectGetRequest
      tags:
        - proxy elasticsearch projects
      requestBody:
        description: The request body
        content:
          "*:*": {}
      responses:
        "200":
          description: Request successfully proxied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyValue"
            "*:*": {}
        "404":
          $ref: "./user-v1-spec.yml#/components/responses/NotFound"

    put:
      description: Proxies a PUT request through to the underlying Elasticsearch instance.
      summary: Proxy PUT request to Elasticsearch
      operationId: adminProxyElasticsearchProjectPutRequest
      tags:
        - proxy elasticsearch projects
      requestBody:
        description: The request body
        content:
          "*/*": {}
      responses:
        "200":
          description: Request successfully proxied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyValue"
            "*:*": {}
        "404":
          $ref: "./user-v1-spec.yml#/components/responses/NotFound"

    post:
      description: Proxies a POST request through to the underlying Elasticsearch instance.
      summary: Proxy POST request to Elasticsearch
      operationId: adminProxyElasticsearchProjectPostRequest
      tags:
        - proxy elasticsearch projects
      requestBody:
        description: The request body
        content:
          "*/*": {}
      responses:
        "200":
          description: Request successfully proxied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyValue"
            "*:*": {}
        "404":
          $ref: "./user-v1-spec.yml#/components/responses/NotFound"

    delete:
      description: Proxies a DELETE request through to the underlying Elasticsearch instance.
      summary: Proxy DELETE request to Elasticsearch
      operationId: adminProxyElasticsearchProjectDeleteRequest
      tags:
        - proxy elasticsearch projects
      requestBody:
        description: The request body
        content:
          "*/*": {}
      responses:
        "200":
          description: Request successfully proxied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnyValue"
            "*:*": {}
        "404":
          $ref: "./user-v1-spec.yml#/components/responses/NotFound"

  /api/v1/admin/serverless/projects/elasticsearch/{id}/_reprocess:
    parameters:
      - name: id
        description: The ID of the project
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/ProjectID"

    post:
