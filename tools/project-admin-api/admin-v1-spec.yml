components:
  schemas:
    AnyValue:
      description: "Can be anything: string, number, array, object, etc., including `null`"
      example: This could be any valid JSON value. A string, number, boolean, array, object

    ApplicationOverrides:
      type: object
      description: Overrides applied to an application.
      properties:
        docker_image:
          description: An alternative docker image to use
          type: string
          x-oapi-codegen-extra-tags:
            safe-to-log: "true"
      x-oapi-codegen-extra-tags:
        safe-to-log: "true"

    CloudID:
      type: string
      description: The cloud ID, an encoded string that provides other Elastic services with the necessary information to connect to this Elasticsearch and Kibana.
      x-oapi-codegen-extra-tags:
        safe-to-log: "true"

    ClusterID:
      type: string
      description: Unique human-readable identifier for an application cluster
      example: prd-awsuse1-cp-internal-app-1
      x-oapi-codegen-extra-tags:
        safe-to-log: "true"

    CommonProjectFields:
      type: object
      description: Common fields of serverless projects.
      required:
        - id
        - name
        - alias
        - region_id
        - metadata
        - cloud_id
      properties:
        id:
          $ref: "#/components/schemas/ProjectID"
        name:
          $ref: "#/components/schemas/ProjectName"
        region_id:
          $ref: "#/components/schemas/RegionID"
        alias:
          $ref: "#/components/schemas/ProjectAlias"
        metadata:
          $ref: "#/components/schemas/ProjectMetadata"
        cloud_id:
          $ref: "#/components/schemas/CloudID"
        trial:
          type: boolean
      x-oapi-codegen-extra-tags:
        safe-to-log: "true"

    CommonProjectOverrides:
      type: object
      description: Overrides applied to managed project configuration. Overrides and their child properties are admin only, they can only be updated and read by Elastic employees.
      properties:
        elasticsearch:
          $ref: "#/components/schemas/ApplicationOverrides"
        kibana:
          $ref: "#/components/schemas/ApplicationOverrides"
        cluster:
          type: string
          description: The Cluster ID where the application should be deployed
          x-oapi-codegen-extra-tags:
            safe-to-log: "true"
      minProperties: 1
      x-oapi-codegen-extra-tags:
        safe-to-log: "true"

    ElasticsearchOptimizedFor:
      type: string
      description: The purpose for which the hardware of this elasticsearch project is optimized for. Also known as the Elasticsearch project subtype. The 'search' value is deprecated and should no longer be used.
      enum: [search, general_purpose, vector]
      x-oapi-codegen-extra-tags:
        safe-to-log: "true"

    ElasticsearchProject:
      description: An Elasticsearch serverless project.
      allOf:
        - $ref: "#/components/schemas/CommonProjectFields"
        - $ref: "#/components/schemas/ElasticsearchProjectFields"

    ElasticsearchProjectClusters:
      type: object
      description: The ID of the Kubernetes clusters where each application is deployed.
      properties:
        elasticsearch:
          $ref: "#/components/schemas/ClusterID"
        kibana:
          $ref: "#/components/schemas/ClusterID"
      x-oapi-codegen-extra-tags:
        safe-to-log: "true"

    ElasticsearchProjectEndpoints:
      type: object
      description: The endpoints to access the different apps of the project.
      required:
        - elasticsearch
        - kibana
      properties:
        elasticsearch:
          type: string
          description: The endpoint to access elasticsearch.
          x-oapi-codegen-extra-tags:
            safe-to-log: "true"
        kibana:
          type: string
          description: The endpoint to access kibana.
          x-oapi-codegen-extra-tags:
            safe-to-log: "true"
      x-oapi-codegen-extra-tags:
        safe-to-log: "true"

    ElasticsearchProjectFields:
      type: object
      description: Specific fields of an Elasticsearch serverless project.
      required:
        - type
        - optimized_for
        - endpoints
      properties:
        type:
          type: string
          description: the type of the project
          enum: [elasticsearch]
          x-oapi-codegen-extra-tags:
            safe-to-log: "true"
        optimized_for:
          $ref: "#/components/schemas/ElasticsearchOptimizedFor"
        search_lake:
          $ref: "#/components/schemas/ElasticsearchSearchLake"
        endpoints:
          $ref: "#/components/schemas/ElasticsearchProjectEndpoints"
        clusters:
          $ref: "#/components/schemas/ElasticsearchProjectClusters"
        overrides:
          $ref: "#/components/schemas/CommonProjectOverrides"
      x-oapi-codegen-extra-tags:
        safe-to-log: "true"

    ElasticsearchProjectList:
      type: object
      description: A paginated list of serverless elasticsearch projects.
      required:
        - items
      properties:
        next_page:
          description: A token to fetch the next page.
          type: string
          x-go-type: apiutil.APIContinuationToken
          x-go-type-import:
            path: github.com/elastic/k8s-arch-commons/pkg/apiutil
        items:
          type: array
          description: The actual projects.
          items:
            $ref: "#/components/schemas/ElasticsearchProject"
          x-oapi-codegen-extra-tags:
            safe-to-log: "true"

    ElasticsearchSearchLake:
      type: object
      description: Configuration for entire set of capabilities that make the data searchable in Elasticsearch.
      properties:
        search_power:
          type: integer
          description: Controls how fast searches are against the project data. When ingested, a certain amount of data is loaded into a cache that makes it super fast to query. You can either increase the performance of searches on cached data by adding replicas, or reduce the quantity of cached data by a static factor to save on costs.
          minimum: 5
          maximum: 100000
          x-oapi-codegen-extra-tags:
            safe-to-log: "true"
        boost_window:
          description: Determines how much data can benefit from faster search. When ingested, a certain amount of data is loaded into a cache that makes it super fast to query. The system dynamically adjusts the cache allocated to the project based on how much data is ingested during the period defined by the Search Boost Window.
          type: integer
          x-oapi-codegen-extra-tags:
            safe-to-log: "true"
      x-oapi-codegen-extra-tags:
        safe-to-log: "true"

    FleetOverrides:
      type: object
      description: Overrides applied to managed project configuration. Overrides and their child properties are admin only, any values specified here will be ignored unless you're an Elastic employee.
      properties:
        fleet:
          $ref: "#/components/schemas/ApplicationOverrides"
      x-oapi-codegen-extra-tags:
        safe-to-log: "true"

    ObservabilityProject:
      description: An Observability project.
      allOf:
        - $ref: "#/components/schemas/CommonProjectFields"
        - $ref: "#/components/schemas/ObservabilityProjectFields"

    ObservabilityProjectClusters:
      type: object
      description: The ID of the Kubernetes clusters where each application is deployed.
      properties:
        elasticsearch:
          $ref: "#/components/schemas/ClusterID"
        kibana:
          $ref: "#/components/schemas/ClusterID"
        fleet:
          $ref: "#/components/schemas/ClusterID"
        apm:
          $ref: "#/components/schemas/ClusterID"
      x-oapi-codegen-extra-tags:
        safe-to-log: "true"

    ObservabilityProjectEndpoints:
      type: object
      description: The endpoints to access the different apps of the project.
      required:
        - elasticsearch
        - kibana
        - apm
      properties:
        elasticsearch:
          description: The endpoint to access elasticsearch.
          type: string
          x-oapi-codegen-extra-tags:
            safe-to-log: "true"
        kibana:
          type: string
          description: The endpoint to access kibana.
          x-oapi-codegen-extra-tags:
            safe-to-log: "true"
        apm:
          type: string
          description: The endpoint to access APM.
          x-oapi-codegen-extra-tags:
            safe-to-log: "true"
      x-oapi-codegen-extra-tags:
        safe-to-log: "true"

    ObservabilityProjectFields:
      type: object
      description: Specific fields of an Observability project.
      required:
        - type
        - endpoints
      properties:
        type:
          type: string
          description: the type of the project
          enum: [observability]
          x-oapi-codegen-extra-tags:
            safe-to-log: "true"
        endpoints:
          $ref: "#/components/schemas/ObservabilityProjectEndpoints"
        clusters:
          $ref: "#/components/schemas/ObservabilityProjectClusters"
        overrides:
          $ref: "#/components/schemas/ObservabilityProjectOverrides"

    ObservabilityProjectList:
      type: object
      description: A paginated list of serverless Observability projects.
      required:
        - items
      properties:
        next_page:
          description: A token to fetch the next page.
          type: string
          x-go-type: apiutil.APIContinuationToken
          x-go-type-import:
            path: github.com/elastic/k8s-arch-commons/pkg/apiutil
        items:
          type: array
          description: The actual projects.
          items:
            $ref: "#/components/schemas/ObservabilityProject"
          x-oapi-codegen-extra-tags:
            safe-to-log: "true"

    ObservabilityProjectOverrides:
      description: Overrides applied to managed project configuration. Overrides and their child properties are admin only, any values specified here will be ignored unless you're an Elastic employee.
      allOf:
        - $ref: "#/components/schemas/CommonProjectOverrides"
        - $ref: "#/components/schemas/FleetOverrides"
      minProperties: 1
      x-oapi-codegen-extra-tags:
        safe-to-log: "true"

    OptionalApplicationOverrides:
      type: object
      description: Overrides applied to applications. They can be passed as `null` to delete existing application overrides.
      properties:
        docker_image:
          description: An alternative docker image to use
          type: string
          nullable: true
          x-oapi-codegen-extra-tags:
            safe-to-log: "true"
      nullable: true
      x-oapi-codegen-extra-tags:
        safe-to-log: "true"

    OptionalCommonProjectOverrides:
      type: object
      description: Overrides applied to managed project configuration. Overrides and their child properties are admin only, any values specified here will be ignored unless you're an Elastic employee.
      properties:
        elasticsearch:
          $ref: "#/components/schemas/OptionalApplicationOverrides"
        kibana:
          $ref: "#/components/schemas/OptionalApplicationOverrides"
      minProperties: 1
      nullable: true
      x-oapi-codegen-extra-tags:
        safe-to-log: "true"

    OptionalElasticsearchSearchLake:
      type: object
      description: Configuration for entire set of capabilities that make the data searchable in Elasticsearch. It can be passed as `null` to reset configuration to the default values.
      properties:
        search_power:
          type: integer
          nullable: true
          description: Controls how fast searches are against the project data. When ingested, a certain amount of data is loaded into a cache that makes it super fast to query. You can either increase the performance of searches on cached data by adding replicas, or reduce the quantity of cached data by a static factor to save on costs. It can be passed as `null` to reset the Search Power to the default value.
          minimum: 5
          maximum: 100000
          x-oapi-codegen-extra-tags:
            safe-to-log: "true"
        boost_window:
          description: Determines how much data can benefit from faster search. When ingested, a certain amount of data is loaded into a cache that makes it super fast to query. The system dynamically adjusts the cache allocated to the project based on how much data is ingested during the period defined by the Search Boost Window. It can be passed as `null` to reset the boost_window to the default value.
          type: integer
          nullable: true
          x-oapi-codegen-extra-tags:
            safe-to-log: "true"
      nullable: true
      x-oapi-codegen-extra-tags:
        safe-to-log: "true"

    OptionalFleetOverrides:
      type: object
      description: Overrides applied to managed project configuration. Overrides and their child properties are admin only, any values specified here will be ignored unless you're an Elastic employee.
      properties:
        fleet:
          $ref: "#/components/schemas/OptionalApplicationOverrides"
      nullable: true
      x-oapi-codegen-extra-tags:
        safe-to-log: "true"

    OptionalObservabilityProjectOverrides:
      type: object
      description: Overrides applied to managed project configuration. Overrides and their child properties are admin only, any values specified here will be ignored unless you're an Elastic employee.
      allOf:
        - $ref: "#/components/schemas/OptionalCommonProjectOverrides"
        - $ref: "#/components/schemas/OptionalFleetOverrides"
      minProperties: 1
      nullable: true
      x-oapi-codegen-extra-tags:
        safe-to-log: "true"

    OptionalSecurityProjectOverrides:
      type: object
      description: Overrides applied to managed project configuration. Overrides and their child properties are admin only, any values specified here will be ignored unless you're an Elastic employee.
      allOf:
        - $ref: "#/components/schemas/OptionalCommonProjectOverrides"
        - $ref: "#/components/schemas/OptionalFleetOverrides"
      minProperties: 1
      nullable: true
      x-oapi-codegen-extra-tags:
        safe-to-log: "true"

    PatchElasticsearchProjectRequest:
      type: object
      description: A request to update an existing Elasticsearch serverless project.
      properties:
        name:
          $ref: "#/components/schemas/ProjectName"
        alias:
          $ref: "#/components/schemas/ProjectAlias"
        search_lake:
          $ref: "#/components/schemas/OptionalElasticsearchSearchLake"
        overrides:
          $ref: "#/components/schemas/OptionalCommonProjectOverrides"
      additionalProperties: false

    PatchObservabilityProjectRequest:
      type: object
      description: A request to update an existing Observability project.
      properties:
        name:
          $ref: "#/components/schemas/ProjectName"
        alias:
          $ref: "#/components/schemas/ProjectAlias"
        overrides:
          $ref: "#/components/schemas/OptionalObservabilityProjectOverrides"
      additionalProperties: false

    PatchSecurityProjectRequest:
      type: object
      description: A request to update an existing Security project.
      properties:
        name:
          $ref: "#/components/schemas/ProjectName"
        alias:
          $ref: "#/components/schemas/ProjectAlias"
        overrides:
          $ref: "#/components/schemas/OptionalSecurityProjectOverrides"
        admin_features_package:
          $ref: "./user-v1-spec.yml#/components/schemas/OptionalSecurityAdminFeaturesPackage"
        product_types:
          type: array
          nullable: true
          items:
            $ref: "./user-v1-spec.yml#/components/schemas/SecurityProductType"
          minItems: 1
          maxItems: 3
          x-oapi-codegen-extra-tags:
            safe-to-log: "true"
      additionalProperties: false

    ProjectAlias:
      type: string
      description: A custom domain label compatible with RFC-1035 standards. Derived from the project name by default.
      maxLength: 50
      minLength: 1
      pattern: "^[a-zA-Z]{1}(?:[a-zA-Z0-9-]*[a-zA-Z0-9]{1})?$"
      x-oapi-codegen-extra-tags:
        safe-to-log: "true"

    ProjectID:
      type: string
      description: ID of the project.
      pattern: "^[a-z0-9]{32}$"
      x-oapi-codegen-extra-tags:
        safe-to-log: "true"

    ProjectMetadata:
      type: object
      description: Additional details about the project.
      required:
        - created_at
        - created_by
        - organization_id
      properties:
        created_at:
          type: string
          description: Date and time when the project was created.
          format: date-time
          x-oapi-codegen-extra-tags:
            safe-to-log: "true"
        created_by:
          type: string
          description: The user ID of the user who created the project.
          x-oapi-codegen-extra-tags:
            safe-to-log: "true"
        organization_id:
          type: string
          description: The Organization ID who owns the project.
          x-oapi-codegen-extra-tags:
            safe-to-log: "true"
        deleted_at:
          type: string
          description: Date and time when the project was deleted.
          format: date-time
          x-oapi-codegen-extra-tags:
            safe-to-log: "true"
        suspended_at:
          type: string
          description: Date and time when the project was suspended.
          format: date-time
          x-oapi-codegen-extra-tags:
            safe-to-log: "true"
        suspended_by:
          type: string
          description: The user ID of the user who suspended the project.
          x-oapi-codegen-extra-tags:
            safe-to-log: "true"
        suspended_reason:
          type: string
          description: Reason why the project was suspended.
          x-oapi-codegen-extra-tags:
            safe-to-log: "true"
      x-oapi-codegen-extra-tags:
        safe-to-log: "true"

    ProjectName:
      type: string
      description: Descriptive name for a project.
