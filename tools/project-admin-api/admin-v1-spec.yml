openapi: 3.0.1
info:
  title: Project API
  description: The Project API allows managing Elastic Cloud Serverless Projects.
  version: 0.1.0
tags:
  - name: all projects
    description: Management projects of any kind
  - name: elasticsearch projects
    description: Management of Elasticsearch projects
  - name: proxy elasticsearch projects
    description: Proxy requests through to the underlying Elasticsearch instance of the elasticsearch project
  - name: observability projects
    description: Management of Observability projects
  - name: proxy observability projects
    description: Proxy requests through to the underlying Elasticsearch instance of the observability project
  - name: security projects
    description: Management of Security projects
  - name: proxy security projects
    description: Proxy requests through to the underlying Elasticsearch instance of the security project

paths:

  /api/v1/admin/serverless/projects/_convert-to-paid:
    post:
      description: Convert all the active projects of an organization from trial to paid. Deleted projects will be converted if they are restored at some point.
      summary: Convert projects from trial to paid
      operationId: convertOrganizationProjectsToPaid
      tags:
        - all projects
      parameters:
        - name: organization_id
          in: query
          description: Organization whose projects will be converted from trial to paid
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Organization projects successfully converted to paid
        "401":
          $ref: "./user-v1-spec.yml#/components/responses/Unauthorized"

  /api/v1/admin/serverless/projects/_suspend:
    post:
      description: Suspend all the projects of an organization. Users will be able to resume them later when the organization has converted to paying.
      summary: Suspend projects
      operationId: suspendOrganizationProjects
      tags:
        - all projects
      parameters:
        - name: organization_id
          in: query
          description: Organization whose projects will be suspended
          required: true
          schema:
            type: string
      requestBody:
        description: The details for suspending all the projects from an organization
        required: true
        content:
          application/json:
            example:
              cause: Trial expired on Jan 22nd 2023
            schema:
              $ref: "#/components/schemas/SuspendOrganizationProjectsRequest"
      responses:
        "200":
          description: Organization projects successfully suspended
        "401":
          $ref: "./user-v1-spec.yml#/components/responses/Unauthorized"

  /api/v1/admin/serverless/projects/elasticsearch:
    get:
      description: The number of projects included can be configured with page_size. Consecutive calls can be made to retrieve next pages by providing a token.
      summary: Get Elasticsearch projects
      operationId: adminListElasticsearchProjects
      tags:
        - elasticsearch projects
      parameters:
        - name: organization_id
          in: query
          description: Filters the returned list of projects by the organization_id provided.
          required: false
          schema:
            type: string
        - name: region_id
          in: query
          description: Filters the returned list of projects by the region_id provided.
          required: false
          schema:
            type: string
        - name: cluster_id
          in: query
          description: Filters the returned list of projects by the cluster_id provided.
          required: false
          schema:
            type: string
        - name: include_deleted
          in: query
          description: Includes deleted projects in the returned list when true.
          required: false
          schema:
            type: boolean
        - name: project_id
          in: query
          description: Filters the returned list of projects starting with the project_id provided.
          required: false
          schema:
            $ref: "#/components/schemas/ProjectID"
        - name: page_size
          in: query
          description: Maximum number of projects returned in the response.
          required: false
          schema:
            type: integer
            minimum: 0
        - name: next_page
          in: query
          description: Token to the next page containing the list of projects.
          required: false
          schema:
            type: string
            x-go-type: apiutil.APIContinuationToken
            x-go-type-import:
              path: github.com/elastic/k8s-arch-commons/pkg/apiutil
      responses:
        "200":
          description: The Elasticsearch project list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ElasticsearchProjectList"
        "401":
          $ref: "./user-v1-spec.yml#/components/responses/Unauthorized"

  /api/v1/admin/serverless/projects/elasticsearch/{id}:
    parameters:
      - name: id
        description: The ID of the project
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/ProjectID"

    get:
      summary: Get an Elasticsearch project
      operationId: adminGetElasticsearchProject
      tags:
        - elasticsearch projects
      responses:
        "200":
          description: The requested elasticsearch project
          headers:
            ETag:
              schema:
                type: string
                x-go-type: httputil.ETag
                x-go-type-import:
                  path: github.com/elastic/k8s-arch-commons/pkg/httputil
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ElasticsearchProject"
        "404":
          $ref: "./user-v1-spec.yml#/components/responses/NotFound"
    patch:
      description: Only the fields included in the body of the request will be updated.
      summary: Update an Elasticsearch project
      operationId: adminPatchElasticsearchProject
      tags:
        - elasticsearch projects
      parameters:
        - name: If-Match
          in: header
          description: ETag value fetched in a previous GET project request. Used to prevent simultaneous updates
          required: false
          schema:
            type: string
            x-go-type: httputil.ETag
            x-go-type-import:
              path: github.com/elastic/k8s-arch-commons/pkg/httputil
      requestBody:
        description: The patched Elasticsearch project
        required: true
        content:
          application/json:
            example:
              name: Example project
            schema:
              $ref: "#/components/schemas/PatchElasticsearchProjectRequest"
      responses:
        "200":
          description: The updated Elasticsearch project.
          headers:
            ETag:
              schema:
                type: string
                x-go-type: httputil.ETag
                x-go-type-import:
                  path: github.com/elastic/k8s-arch-commons/pkg/httputil
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ElasticsearchProject"
        "400":
          $ref: "./user-v1-spec.yml#/components/responses/BadRequest"
        "404":
          $ref: "./user-v1-spec.yml#/components/responses/NotFound"
        "422":
          $ref: "./user-v1-spec.yml#/components/responses/UnprocessableEntity"

    delete:
      summary: Delete an Elasticsearch project
      operationId: adminDeleteElasticsearchProject
      tags:
        - elasticsearch projects
      parameters:
        - name: If-Match
          in: header
          description: ETag value fetched in a previous GET project request. Used to prevent simultaneous updates
          required: false
          schema:
            type: string
            x-go-type: httputil.ETag
            x-go-type-import:
              path: github.com/elastic/k8s-arch-commons/pkg/httputil
      responses:
        "200":
          description: Project deletion scheduled.
          headers:
            ETag:
              schema:
                type: string
                x-go-type: httputil.ETag
                x-go-type-import:
                  path: github.com/elastic/k8s-arch-commons/pkg/httputil
        "404":
          $ref: "./user-v1-spec.yml#/components/responses/NotFound"

  /api/v1/admin/serverless/projects/elasticsearch/{id}/_proxy/{path}:
    parameters:
      - name: id
        description: The ID of the project
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/ProjectID"
