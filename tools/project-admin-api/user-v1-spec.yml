          x-go-type: httputil.ETag
          x-go-type-import:
            path: github.com/elastic/k8s-arch-commons/pkg/httputil

    post:
      x-internal: true
      description: Retrieve new project internal credentials, invalidating the previous ones. For internal Elastic use only, used for testing purposes.
      summary: Reset the project internal credentials
      operationId: resetElasticsearchProjectInternalCredentials
      tags:
        - elasticsearch projects
      responses:
        "200":
          description: The new project internal credentials.
