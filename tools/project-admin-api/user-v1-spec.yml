components:
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MultiErrorResponse"
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MultiErrorResponse"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MultiErrorResponse"
    UnprocessableEntity:
      description: Unprocessable entity
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MultiErrorResponse"

  schemas:
    ApplicationOverrides:
      type: object
      description: Overrides applied to an application. For internal Elastic use only. Any specified values are ignored unless you're an Elastic employee.
      properties:
        docker_image:
          description: An alternative docker image to use
          type: string
          x-oapi-codegen-extra-tags:
            safe-to-log: "true"
          example: "docker.elastic.co/elasticsearch-ci/application:git-dd26caada336"
      x-oapi-codegen-extra-tags:
        safe-to-log: "true"

    CloudID:
      type: string
      description: The cloud ID, an encoded string that provides other Elastic services with the necessary information to connect to this Elasticsearch and Kibana.
      example: "my_project:LmF3cy5lbGFzdG"
      x-oapi-codegen-extra-tags:
        safe-to-log: "true"

    CommonProjectFields:
      type: object
      description: Common fields of serverless projects.
      required:
        - id
        - name
        - alias
        - region_id
        - metadata
        - cloud_id
      properties:
        id:
          $ref: "#/components/schemas/ProjectID"
        name:
          $ref: "#/components/schemas/ProjectName"
        alias:
          $ref: "#/components/schemas/ProjectAlias"
        region_id:
          $ref: "#/components/schemas/RegionID"
        metadata:
          $ref: "#/components/schemas/ProjectMetadata"
        cloud_id:
          $ref: "#/components/schemas/CloudID"
      x-oapi-codegen-extra-tags:
        safe-to-log: "true"

    CommonProjectOverrides:
      type: object
      description: For internal Elastic use only. Overrides applied to managed project configuration. Overrides and their child properties are admin only. Any specified values are ignored unless you're an Elastic employee.
      properties:
        elasticsearch:
          $ref: "#/components/schemas/ApplicationOverrides"
        kibana:
          $ref: "#/components/schemas/ApplicationOverrides"
        cluster:
          type: string
          description: The Cluster ID where the applications should be deployed
          x-oapi-codegen-extra-tags:
            safe-to-log: "true"
          example: qa-awseuw1-cp-internal-app-1
      minProperties: 1
      x-internal: true
      x-oapi-codegen-extra-tags:
        safe-to-log: "true"

    CreateElasticsearchProjectRequest:
      type: object
      description: A request to create an Elasticsearch serverless project.
      required:
        - name
        - region_id
      properties:
        name:
          $ref: "#/components/schemas/ProjectName"
        alias:
          $ref: "#/components/schemas/ProjectAlias"
        region_id:
          $ref: "#/components/schemas/RegionID"
        optimized_for:
          $ref: "#/components/schemas/ElasticsearchOptimizedFor"
        search_lake:
          $ref: "#/components/schemas/ElasticsearchSearchLake"
        overrides:
          $ref: "#/components/schemas/CommonProjectOverrides"
      additionalProperties: false

    CreateObservabilityProjectRequest:
      type: object
      description: A request to create an Observability project.
      required:
        - name
        - region_id
      properties:
        name:
          $ref: "#/components/schemas/ProjectName"
        alias:
          $ref: "#/components/schemas/ProjectAlias"
        region_id:
          $ref: "#/components/schemas/RegionID"
        overrides:
          $ref: "#/components/schemas/ObservabilityProjectOverrides"
      additionalProperties: false

    CreateSecurityProjectRequest:
      type: object
      description: A request to create a Security project.
      required:
        - name
        - region_id
      properties:
        name:
          $ref: "#/components/schemas/ProjectName"
        alias:
          $ref: "#/components/schemas/ProjectAlias"
        region_id:
          $ref: "#/components/schemas/RegionID"
        overrides:
          $ref: "#/components/schemas/SecurityProjectOverrides"
        admin_features_package:
          $ref: "#/components/schemas/SecurityAdminFeaturesPackage"
        product_types:
          type: array
          items:
            $ref: "#/components/schemas/SecurityProductType"
          default: [{product_line: security, product_tier: complete}, {product_line: cloud, product_tier: complete}, {product_line: endpoint, product_tier: complete}]
          minItems: 2
          maxItems: 3
          x-oapi-codegen-extra-tags:
            safe-to-log: "true"
      additionalProperties: false

    ElasticsearchOptimizedFor:
      type: string
      description: The purpose for which the hardware of this elasticsearch project is optimized for. Also known as the Elasticsearch project subtype.
      enum: [general_purpose, vector]
      example: general_purpose
      x-oapi-codegen-extra-tags:
        safe-to-log: "true"

    ElasticsearchProject:
      description: An Elasticsearch serverless project.
      allOf:
        - $ref: "#/components/schemas/CommonProjectFields"
        - $ref: "#/components/schemas/ElasticsearchProjectFields"

    ElasticsearchProjectCreated:
      description: The created Elasticsearch project along with credentials to access Elasticsearch.
