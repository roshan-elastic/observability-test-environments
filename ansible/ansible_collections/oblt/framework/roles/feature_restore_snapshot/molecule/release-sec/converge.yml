---
- name: Converge
  hosts: localhost
  connection: local
  gather_facts: true
  environment:
    HOME: "{{ build_dir }}"
    PATH: "{{ build_dir }}/bin:{{ lookup('env','PATH') }}"
  vars_files:
    - "{{ lookup('env', 'MOLECULE_SCENARIO_DIRECTORY') }}/cluster-config.yml"
  roles:
    - role: oblt.framework.tools
    - role: oblt.framework.common
    - role: oblt.framework.stack_ess

  tasks:
    - name: Include tasks snapshot-repos-oblt-ro.yml
      include_role:
        name: oblt.framework.cluster_tasks
        tasks_from: snapshot-repos-oblt-ro.yml

    - name: Include tasks from feature_restore_snapshot
      vars:
        role_parameters:
          repository: "external_gcs_repository_release-sec"
          include_global_state: true
          ignore_unavailable: true
          indices:
            - "-.apm-source-map"
            - "-.kibana-observability-ai-assistant-*"
            - "-.ml-*"
            - "-.transform-*"
            - "-logs-cloud_security_posture.*"
          progress_delay: 60

      include_role:
        name: oblt.framework.feature_restore_snapshot
