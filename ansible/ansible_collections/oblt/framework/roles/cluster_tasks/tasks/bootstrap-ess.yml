---
- name: Processing {{ item }}
  set_fact:
    bootstrap_api: "{{ lookup('ansible.builtin.template', '{{ item }}') | from_yaml }}"

- name: Bootstrap a ESS using the API
  vars:
    ess_api_key: "{{ (lookup('oblt.framework.gcp_secret_manager', key=secret_ess_user)|safe()|from_yaml).apiKey | mandatory }}"
    ess_headers_tmp: |
      Authorization: "ApiKey {{ ess_api_key }}"
      {% for k,v in (bootstrap_api.headers.items() | default(None)) %}
      {{ k }}: {{ v }}
      {% endfor %}
    ess_headers: "{{ ess_headers_tmp | from_yaml }}"
  uri:
    url: "{{ ess_endpoint }}{{ bootstrap_api.api }}"
    method: "{{ bootstrap_api.method }}"
    validate_certs: false
    headers: "{{ ess_headers }}"
    body_format: "{{ bootstrap_api.body_format | default('json') }}"
    body: "{{ bootstrap_api.body }}"
    status_code: "{{ bootstrap_api.return_code }}"
  register: bootstrap_ess_result
  ignore_errors: "{{ bootstrap_api.ignore_errors | default(false) }}"
  retries: "{{ bootstrap_api.retries | default(3) | int }}"
  delay: "{{ bootstrap_api.delay | default(10) | int }}"
  until: bootstrap_ess_result.status in bootstrap_api.return_code

- name: Set facts for {{ bootstrap_api.description | default(bootstrap_api.api) }}
  set_fact:
    "{{ bootstrap_api.register }}": "{{ bootstrap_ess_result }}"
  when:
    - bootstrap_ess_result is defined
    - bootstrap_api.register is defined
