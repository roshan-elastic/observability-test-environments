---
- name: Add charts repositories
  changed_when: false
  shell: |
    helm repo add {{ item.repo }}
  loop:
    - repo: bitnami https://charts.bitnami.com/bitnami
    - repo: elastic https://helm.elastic.co
    - repo: elastic-dev https://helm-dev.elastic.co
    - repo: jetstack https://charts.jetstack.io
    - repo: stable https://charts.helm.sh/stable
    - repo: grafana https://grafana.github.io/helm-charts
    - repo: prometheus-community https://prometheus-community.github.io/helm-charts
    - repo: kube-state-metrics https://kubernetes.github.io/kube-state-metrics
    - repo: ingress-nginx https://kubernetes.github.io/ingress-nginx
    - repo: jenkinsci https://charts.jenkins.io
    - repo: vmware-tanzu https://vmware-tanzu.github.io/helm-charts
    - repo: open-telemetry https://open-telemetry.github.io/opentelemetry-helm-charts
    - repo: strimzi https://strimzi.io/charts/
    - repo: argo https://argoproj.github.io/argo-helm
    - repo: external-secrets https://charts.external-secrets.io
    - repo: crossplane-stable https://charts.crossplane.io/stable
    - repo: reloader https://stakater.github.io/stakater-charts
  tags:
    - helm
    - cli

- name: Update helm repos
  changed_when: false
  shell: |
    helm repo update
  tags:
    - helm
    - update
