---
- name: Check that the {{ k8s_dir }}/elasticsearch folder exists
  stat:
    path: "{{ k8s_dir }}/elasticsearch"
  register: stat_result

- name: Undeploy ECK Elasticsearch
  changed_when: false
  kubernetes.core.k8s:
    namespace: "{{ k8s_default_namespace }}"
    state: absent
    src: "{{ item.yml }}"
  loop:
    - yml: "{{ k8s_dir }}/elasticsearch/elasticsearch-deployment.yaml"
    - yml: "{{ k8s_dir }}/elasticsearch/elasticsearch-ingress.yaml"
    - yml: "{{ k8s_dir }}/es-secrets.yaml"
  when:
    - stat_result.stat.exists
  tags:
    - elasticsearch
    - undeploy
