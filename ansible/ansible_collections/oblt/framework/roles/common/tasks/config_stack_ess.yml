  set_fact:
    ess_region: "{{ stack.ess.region | default('eastus2') }}"
    ess_template: "{{ stack.ess.template | default('azure-storage-optimized') }}"
    ess_es_mem: "{{ stack.ess.elasticsearch.mem | default(8) }}"
    ess_max_mem: "{{ stack.ess.elasticsearch.max_mem | default(60) }}"
  when:
    - stack is defined
    - stack_mode == 'ess'
    - ess_provider == 'azure'
    - stack_target == 'production'

- name: Load OpenAI settings
  vars:
    credentials: "{{ lookup('oblt.framework.gcp_secret_manager', key=kibana_open_ai_secret)|safe()|from_yaml }}"
  set_fact:
    kibana_open_ai_apikey: "{{ credentials.apiKey | default(None) }}"
    kibana_open_ai_service: "{{ credentials.service | default(None) }}"
    kibana_open_ai_resource_name: "{{ credentials.resourceName | default(None) }}"
    kibana_open_ai_deployment_id: "{{ credentials.deploymentId | default(None) }}"
  when:
    - stack is defined
    - stack_mode == 'ess'
    - kibana_open_ai_secret is defined
    - kibana_open_ai_secret != ''
