---
# yaml-language-server: $schema=../schema.json
## @section Common
## @param password_plaintext [string] The password in plaintext used for some services. It is autogenerated if not provided.
password_plaintext: "{{ lookup('password', '{{ build_dir }}/password chars=ascii_letters,digits,hexdigits') }}"
## @param deploy_timestamp [string] The deploy timestamp in the format '%Y-%m-%d %H:%M:%S' (e.g. 2021-01-01 00:00:00), it is autogenerated. It used to tag deployments with the timestamp.
deploy_timestamp: "{{ '%Y-%m-%d %H:%M:%S' | strftime }}"
# https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-state-metrics
## @param kube_state_metrics_version [string] The kube-state-metrics version
kube_state_metrics_version: 5.25.1
## @param default_x509_cert_secret [string] The default x509 cert secret secret name
default_x509_cert_secret: "oblt-clusters_x509-selfsigned"
## @param github_enabled [string] Enable CI mode
github_enabled: "{{ lookup('env', 'GITHUB_ENABLED') | default(false) | bool }}"
## @param cluster_hash [string] The cluster hash, it is a md5 hash of the cluster name (first 6 characters), it is used to generate unique names.
cluster_hash: "{{ (cluster_name | md5)[:6] }}"
## @param gcp_dir [string] The directory where the gcp artifacts are stored
gcp_dir: "{{ build_dir }}/gcp"
## @param private_key_file [string] The private key file, it is used to connect to the GCP instances.
private_key_file: "{{ build_dir }}/id_rsa"
## @param templates_dir [string] The directory where the templates are stored
templates_dir: "{{ playbook_dir }}/templates"
## @param build_dir [string] The directory where the build artifacts are stored
build_dir: "{{ lookup('env','BUILD_DIR') | default(playbook_dir + '/build', true) }}"
## @param k8s_dir [string] The directory where the k8s artifacts are stored
k8s_dir: "{{ build_dir }}/k8s"
## @param helm_dir [string] The directory where the helm artifacts are stored
helm_dir: "{{ build_dir }}/helm"
## @param destroy_cluster [string] Enable Destroy the cluster when the deploy fails
destroy_cluster: "{{ lookup('env','DESTROY_CLUSTER') | default(true, true) | bool }}"
## @param elastic_apm_verify_server_cert [string] Enable Verify the APM server certificates
elastic_apm_verify_server_cert: false
## @param helm_charts_dir [string] The directory where the helm charts are stored
helm_charts_dir: "{{ build_dir }}/helm-charts"
## @param deployment_dir [string] The directory where the deployment (docker, heln, k8s, bootstrap,...) are stored
deployment_dir: "{{ build_dir }}/deployments"
## @param k8s_deployment_dir [string] The directory where the k8s deployment manifests are stored
k8s_deployment_dir: "{{ deployment_dir }}/k8s"
## @param helm_deployment_dir [string] The directory where the helm deployment values are stored
helm_deployment_dir: "{{ deployment_dir }}/helm"
## @param synthetics_deployments_dir [string] The directory where the synthetics deployment values are stored
synthetics_deployments_dir: "{{ deployment_dir }}/synthetics"
## @param ingress_nginx_namespace [string] The namespace where the ingress-nginx is installed
## TODO move to the k8s_ingress role
ingress_nginx_namespace: "ingress-nginx"
## @param default_stack_version [string] The default stack version
default_stack_version: 8.15.0
## @param grab_cluster_info [string] Enable Grab the cluster info and store it on a secret.
grab_cluster_info: false
## @param save_secrets Enable Save the secrets on the secret manager
save_secrets: true
## @param oblt_username [string] The username who owns the cluster
oblt_username: observability-robots
## @param cluster_readme_url [string] The URL template for the cluster README
cluster_readme_url: "https://elastic.github.io/observability-test-environments/{{ cluster_name }}"
## @param cluster_seed [string] The seed for random values, it is used in names in tests to be unique, it is unique per execution.
cluster_seed: "{{ lookup('password', '{{ build_dir }}/cluster-seed chars=ascii_letters,digits length=4') | lower }}"
## @section Bootstrap
## @param bootstrap_cluster [string] Enable Bootstrap the cluster
bootstrap_cluster: false
## @param bootstrap_username [string] The username to bootstrap the cluster
bootstrap_username: "{{ elasticsearch_username }}"
## @param bootstrap_password [string] The password to bootstrap the cluster
bootstrap_password: "{{ elasticsearch_password }}"
## @param default_bootstrap_dir [string] The directory where the bootstrap deployment values are stored
default_bootstrap_dir: "{{ deployment_dir }}/bootstrap"
## @section Cross Cluster Search
## @param configure_ccs_manually [string] Enable Configure the CCS manually
configure_ccs_manually: false
## @param remote_cluster_configure [string] Enable Configure the remote cluster
remote_cluster_configure: false
## @section Docker
## @param docker_registry [string] The docker registry
docker_registry: "{{ lookup('env','DOCKER_REGISTRY') | mandatory }}"
## @param docker_namespace [string] The docker namespace
docker_namespace: "{{ lookup('env','DOCKER_NAMESPACE') | mandatory }}"
## @param docker_image_path [string] The docker image path template
docker_image_path: "{{ docker_registry }}/{{ docker_namespace }}"
## @param docker_auth_usr [string] The docker registry username
docker_auth_usr: "{{ lookup('env','DOCKER_USERNAME') | mandatory }}"
## @param docker_auth_psw [string] The docker registry password
docker_auth_psw: "{{ lookup('env','DOCKER_PASSWORD') | mandatory }}"
## @param docker_email [string] The docker registry email
docker_email: "observability@elastic.co"
## @section Google Cloud Secret Manager
## @param secret_root_gcsm [string] The GCSM secrets root path for all clusters secrets
secret_root_gcsm: "oblt-clusters"
## @param secret_base_gcsm [string] The GCSM secrets base path, it is based on the cluster name
secret_base_gcsm: "{{ secret_root_gcsm }}_{{ cluster_name }}"
## @param credentials_gcsm_def_secret [string] The GCSM cluster credentials secret name
credentials_gcsm_def_secret: "{{ secret_base_gcsm }}_credentials"
## @param elastic_stack_env_gcsm_def_secret [string] The GCSM cluster env secret name
elastic_stack_env_gcsm_def_secret: "{{ secret_base_gcsm }}_env"
## @param deploy_info_gcsm_def_secret [string] The GCSM cluster deploy-info secret name
deploy_info_gcsm_def_secret: "{{ secret_base_gcsm }}_deploy-info"
## @param kibana_yml_gcsm_def_secret [string] The GCSM cluster kibana-yml secret name
kibana_yml_gcsm_def_secret: "{{ secret_base_gcsm }}_kibana-yml"
## @param cluster_state_gcsm_def_secret [string] The GCSM cluster state secret name
cluster_state_gcsm_def_secret: "{{ secret_base_gcsm }}_cluster-state"
## @param activate_gcsm_def_secret [string] The GCSM cluster activate k8s script secret name
activate_gcsm_def_secret: "{{ secret_base_gcsm }}_activate"
## @param cluster_state [string] The cluster state secret value
cluster_state: "{{ lookup('oblt.framework.gcp_secret_manager', key=cluster_state_gcsm_def_secret, on_error='warn')|safe()|from_yaml }}"
## @section Kibana Backup
## @param kibana_backup_enabled [string] Enable Kibana index backup
kibana_backup_enabled: false
## @param kibana_purge_enabled [string] Enable Kibana index purge, deletes the old indice, after reindex the object in the new one.
kibana_purge_enabled: false
## @section EDEN demos
## @param observe_demo_enabled [string] Enable the observe demo
observe_demo_enabled: false
## @param profiling_demo_enabled [string] Enable the profiling demo
profiling_demo_enabled: false
## @section Observability
## @param observability_enabled [string] Enable Observability, it sends the logs, metrics and traces to a observability deployment.
observability_enabled: false
## @param observability_secret [string] The name of the secret with the credentials for the observability deployment.
observability_secret: "oblt-clusters_monitoring-oblt_cluster-state"
## @param observability_transaction_sample_rate The transaction sample rate for the observability configuration.
observability_transaction_sample_rate: 0.75
## @param observability_metrics_interval [string] The metrics interval for the observability configuration.
observability_metrics_interval: "10s"
## @param observability_log_level [string] The log level for the observability configuration.
observability_log_level: "info"
## @param observability_stack_metrics_enabled Enable the metrics stack
observability_stack_metrics_enabled: true
## @param observability_stack_logs_enabled Enable the logs stack
observability_stack_logs_enabled: true
## @param observability_stack_apm_enabled Enable the apm stack
observability_stack_apm_enabled: true
## @section Rally tacks
## @param observability_ci_secret [string] The name of the secret with the credentials for the observability CI deployment.
observability_ci_secret: "oblt-clusters_observability-ci_cluster-state"
