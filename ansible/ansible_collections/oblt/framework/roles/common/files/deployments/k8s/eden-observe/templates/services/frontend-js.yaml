---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-js
  namespace: {{ .Chart.Name }}-{{ .Values.username }}
  labels:
    app: frontend-js
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-js
  template:
    metadata:
      labels:
        app: frontend-js
      annotations:
        co.elastic.monitor/type: tcp
        co.elastic.monitor/name: frontend-js-{{ .Values.username }}
        co.elastic.monitor/hosts: ${data.host}:3000
        co.elastic.monitor/schedule: "@every 10s"
        co.elastic.monitor/timeout: 1s
        co.elastic.logs/enabled: "true"
        co.elastic.logs/json.keys_under_root: "true"
        co.elastic.logs/processors.add_fields.target: "service"
        co.elastic.logs/processors.add_fields.fields.name: "frontend-js"
        eden.core_infra: "true"
    spec:
      imagePullSecrets:
        - name: elastic-prod-registry
      containers:
      - name: frontend-js
        image: docker.elastic.co/{{ .Values.docker_namespace }}/{{ .Chart.Name }}-frontend-js:{{ .Values.es_version }}-{{ .Values.build_num }}
        imagePullPolicy: Always
        readinessProbe:
          httpGet:
            port: 3000
            path: /
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          limits:
           memory: 1000Mi
          requests:
           cpu: 0.05
           memory: 100Mi
        env:
        - name: API_ENDPOINT
          value: "http://frontend-node:3000"
        - name: PORT
          value: "3000"
        - name: ELASTIC_APM_SERVICE_VERSION
          value: "1.6"
        - name: ELASTIC_APM_SERVICE_NAME
          value: "frontend-js"
        - name: ADVERTSERVICE
          value: "advertservice:10000"
        - name: CURRENCY_SERVICE_ADDR
          value: "currencyservice:6000"
        - name: CARTSERVICE
          value: "cartservice:11000"
        - name: PRODUCTCATALOGSERVICE
          value: "productcatalogservice:9000"
        - name: SHIPPING_SERVICE_ADDR
          value: "shippingservice:7000"
        - name: RECOMMENDATIONSERVICE
          value: "recommendationservice:3000"
        - name: CHECKOUTSERVICE
          value: "checkoutservice:8000"
        - name: NEXT_PUBLIC_ELASTIC_APM_SERVER_URLS
          valueFrom:
            secretKeyRef:
              name: {{ .Chart.Name }}-apm-creds
              key: APM_URL
        - name: APM_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Chart.Name }}-apm-creds
              key: APM_SECRET_TOKEN
        - name: ELASTIC_APM_ENVIRONMENT
          value: "prod"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-js
  namespace: {{ .Chart.Name }}-{{ .Values.username }}
  labels:
    app: frontend-js
spec:
  ports:
  - port: 3000
    targetPort: 3000
  selector:
    app: frontend-js
