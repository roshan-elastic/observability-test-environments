---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cartservice
  namespace: {{ .Chart.Name }}-{{ .Values.username }}
  labels:
    app: cartservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cartservice
  template:
    metadata:
      labels:
        app: cartservice
      annotations:
        co.elastic.monitor/type: tcp
        co.elastic.monitor/name: cartservice-{{ .Values.username }}
        co.elastic.monitor/hosts: ${data.host}:11000
        co.elastic.monitor/schedule: "@every 10s"
        co.elastic.monitor/timeout: 1s
        co.elastic.logs/enabled: "true"
        co.elastic.logs/json.keys_under_root: "true"
        co.elastic.logs/processors.add_fields.target: "service"
        co.elastic.logs/processors.add_fields.fields.name: "cartService"
        eden.core_infra: "true"
    spec:
      imagePullSecrets:
        - name: elastic-prod-registry
      containers:
      - name: cartservice
        image: docker.elastic.co/{{ .Values.docker_namespace }}/{{ .Chart.Name }}-cartservice:{{ .Values.es_version }}-{{ .Values.build_num }}
        imagePullPolicy: Always
        readinessProbe:
          tcpSocket:
            port: 11000
          initialDelaySeconds: 15
          periodSeconds: 5
        resources:
          limits:
            cpu: 2000m
            memory: 150Mi
          requests:
            cpu: 40m
            memory: 75Mi
        env:
        - name: REDIS_ADDR
          value: "redis:6379"
        - name: ELASTIC_APM_LOG_LEVEL
          value: "INFO"
        - name: PORT
          value: "11000"
        - name: ELASTIC_APM_SERVICE_VERSION
          value: "1.6"
        - name: ELASTIC_APM_SPAN_COMPRESSION_SAME_KIND_MAX_DURATION
          value: "100ms"
        - name: ELASTIC_APM_SPAN_COMPRESSION_EXACT_MATCH_MAX_DURATION
          value: "100ms"
        - name: ELASTIC_APM_EXIT_SPAN_MIN_DURATION
          value: "0ms"
        - name: ELASTIC_APM_SPAN_COMPRESSION_ENABLED
          value: "true"
        - name: ELASTIC_APM_SERVICE_NAME
          value: "cartService"
        - name: ELASTIC_APM_SERVER_URLS
          valueFrom:
            secretKeyRef:
              name: {{ .Chart.Name }}-apm-creds
              key: APM_URL
        - name: ELASTIC_APM_SECRET_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Chart.Name }}-apm-creds
              key: APM_SECRET_TOKEN
        - name: ELASTIC_APM_ENVIRONMENT
          value: "prod"
        - name: SLOW_TOGGLE
          value: "False"
---
