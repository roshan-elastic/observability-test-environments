---
description: Create a Elastic Agent Policy
api: "/api/fleet/agent_policies"
method: POST
headers:
  Content-Type: application/json
  kbn-xsrf: true
ignore_errors: true
register: fleet_agent_policy_result
body: |
  {
    "name": "Security Linux Policy",
    "id": "security-linux-policy",
    "description": "Policy to configure Security Linux features.",
    "namespace": "default",
    "monitoring_enabled": [
      "logs",
      "metrics"
    ]
  }
return_code:
  - 409
  - 200
