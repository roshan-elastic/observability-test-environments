  junit-stress.dsl: |
    pipelineJob('junit-to-otel/junit-stress') {
      definition {
        cps {
          script('''\
            pipeline {
              agent { label 'k8s' }
              stages {
                stage('run-tests') {
                  steps {
                    parallelSteps(100)
                  }
                }
              }
            }
          }

          def parallelSteps(max){
            def num = (max < 1) ? 1 : max
            def parallelSteps = [:]
            for (i = 0; i < num; i++) {
              parallelSteps["step-${i}"] = {
                  node('k8s'){
                      generateTests()
                  }
              }
            }
            parallel parallelSteps
          }

          def generateTests() {
              sh(label: 'download test-sample1', script: 'curl -s https://raw.githubusercontent.com/mdelapenya/junit2otlp/main/TEST-sample.xml > junit1.xml')
              sh(label: 'download test-sample2', script: 'curl -s https://raw.githubusercontent.com/mdelapenya/junit2otlp/main/TEST-sample2.xml > junit2.xml')
              sh(label: 'download test-sample3', script: 'curl -s https://raw.githubusercontent.com/mdelapenya/junit2otlp/main/TEST-sample3.xml > junit3.xml')
              junit(testDataPublishers: [[$class: 'JUnitOTELReporterTestDataPublisher']], testResults: 'junit*.xml')
          }'''.stripIndent())
          sandbox(true)
        }
      }
    }

