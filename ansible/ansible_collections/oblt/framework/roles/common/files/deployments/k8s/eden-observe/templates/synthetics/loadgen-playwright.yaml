---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loadgen-playwright
  namespace: {{ .Chart.Name }}-{{ .Values.username }}
  labels:
    app: loadgen-playwright
spec:
  replicas: 10
  selector:
    matchLabels:
      app: loadgen-playwright
  template:
    metadata:
      labels:
        app: loadgen-playwright
      annotations:
        eden.core_infra: "false"
    spec:
      imagePullSecrets:
        - name: elastic-prod-registry
      containers:
      - name: loadgen-playwright
        image: docker.elastic.co/{{ .Values.docker_namespace }}/{{ .Chart.Name }}-loadgen-playwright:{{ .Values.es_version }}-{{ .Values.build_num }}
        imagePullPolicy: Always
        #command: ["node"]
        command: [ "/bin/bash", "-c", "--" ]
        args: [ "while true; do node --unhandled-rejections=strict /etc/task.js; sleep 1; done;" ]
        #args: ["/etc/task.js"]
        resources:
          limits:
           memory: 500Mi
          requests:
           cpu: 0.05
           memory: 300Mi
        env:
        - name: DOMAIN
          value: "http://frontend-js-nginx:3000"
        - name: IPRANGE
          value: "1"
        - name: LATENCY
          value: "400"
        volumeMounts:
        - name: config
          mountPath: /etc/task.js
          readOnly: true
          subPath: task.js
      volumes:
      - name: config
        configMap:
          defaultMode: 0777
          name: loadgenerator-config-playwright
---
apiVersion: v1
kind: ConfigMap
metadata:
  name:  loadgenerator-config-playwright
  namespace: {{ .Chart.Name }}-{{ .Values.username }}
  labels:
    k8s-app: loadgenerator
data:
{{- (.Files.Glob "files/loadgen-playwright/*").AsConfig | nindent 4 }}
