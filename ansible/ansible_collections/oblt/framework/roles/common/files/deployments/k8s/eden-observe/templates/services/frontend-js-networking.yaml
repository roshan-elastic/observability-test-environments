---
kind: Service
apiVersion: v1
metadata:
  name: {{ .Chart.Name }}-{{ .Values.username }}-frontend-js
  namespace: default
spec:
  type: ExternalName
  externalName: frontend-js.{{ .Chart.Name }}-{{ .Values.username }}.svc.cluster.local
  ports:
  - port: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Chart.Name }}-{{ .Values.username }}-frontend-js-okta
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    {{- if .Values.obltCluster }}
    cert-manager.io/cluster-issuer: "{{ .Values.ingress.certificateIssuer }}"
    ingress.kubernetes.io/ssl-redirect: "true"
    kubernetes.io/tls-acme: "true"
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: elastic-basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
    {{- else }}
    nginx.ingress.kubernetes.io/auth-signin: "https://okta-proxy.{{ .Values.environment }}.eden.elastic.dev/login?url=$scheme://$http_host$request_uri&vouch-failcount=$auth_resp_failcount&X-Vouch-Token=$auth_resp_jwt&error=$auth_resp_err"
    nginx.ingress.kubernetes.io/auth-url: "https://okta-proxy.{{ .Values.environment }}.eden.elastic.dev/validate"
    nginx.ingress.kubernetes.io/auth-response-headers: X-Vouch-User
    nginx.ingress.kubernetes.io/auth-snippet: |
      # these return values are used by the @error401 call
      auth_request_set $auth_resp_jwt $upstream_http_x_vouch_jwt;
      auth_request_set $auth_resp_err $upstream_http_x_vouch_err;
      auth_request_set $auth_resp_failcount $upstream_http_x_vouch_failcount;
    nginx.ingress.kubernetes.io/configuration-snippet: |
      # set User request header
      proxy_set_header X-Forwarded-User $authHeader0;
    {{- end }}
    nginx.ingress.kubernetes.io/server-snippet: |
      set $http_x_forwarded_demo_name observe;
  labels:
    app: {{ .Chart.Name }}
spec:
  tls:
  {{- if (not .Values.obltCluster) }}
  - hosts:
    - 'hipster-{{ .Values.deploy_num }}.{{ .Values.environment }}.eden.elastic.dev'
    secretName: wildcard-{{ .Values.environment }}-eden-elastic-dev
  rules:
  - host: hipster-{{ .Values.deploy_num }}.{{ .Values.environment }}.eden.elastic.dev
  {{- else }}
  - hosts:
    - 'hipster.{{ .Values.ingress.domain }}'
    secretName: wildcard-{{ .Values.environment }}-eden-elastic-dev
  rules:
  - host: hipster.{{ .Values.ingress.domain }}
  {{- end }}
    http:
      paths:
      - path: /
        pathType: ImplementationSpecific
        backend:
          service:
            name:  {{ .Chart.Name }}-{{ .Values.username }}-frontend-js
            port:
              number: 3000
