{{- if (not .Values.obltCluster) }}
# Workaround: https://github.com/helm/helm/issues/3684#issuecomment-427932707
{{- $dot := . }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: demo-ready
  namespace: {{ .Chart.Name }}-{{ .Values.username }}
spec:
  template:
    metadata:
      labels:
        app: demo-ready
      annotations:
        co.elastic.logs/enabled: "true"
        co.elastic.logs/json.keys_under_root: "true"
        co.elastic.logs/processors.add_fields.fields.name: "demo-ready"
        eden.core_infra: "true"
    spec:
      restartPolicy: Never
      volumes:
      - name: demo-ready-config
        configMap:
          defaultMode: 0777
          name: demo-ready-config
      imagePullSecrets:
        - name: elastic-prod-registry
      containers:
      - name: demo-ready
        image: docker.elastic.co/demos/elastic_utils:7.7.0
        command: ['sh', '-c','/etc/demo-ready.sh']
        volumeMounts:
        - name: demo-ready-config
          mountPath: /etc/demo-ready.sh
          readOnly: true
          subPath: demo-ready.sh
        env:
        - name: ELASTICSEARCH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ $.Chart.Name }}-es-creds
              key: ELASTICSEARCH_PASSWORD
        - name: ELASTICSEARCH_URL
          valueFrom:
            secretKeyRef:
              name: {{ $.Chart.Name }}-es-creds
              key: ELASTICSEARCH_URL
        - name: ENVIRONMENT
          value: {{ .Values.environment }}
        - name: DEPLOY_NUM
          value: "{{ .Values.deploy_num }}"
  backoffLimit: 0
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-ready-config
  namespace: {{ .Chart.Name }}-{{ .Values.username }}
data:
  demo-ready.sh: |-
      count=0
      MAX_ATTEMPTS=50

      curl -u "elastic:${ELASTICSEARCH_PASSWORD}" -XPOST "${ELASTICSEARCH_URL}/logs-apm.app-default/_rollover" -H 'Content-Type: application/json'
      curl -u "elastic:${ELASTICSEARCH_PASSWORD}" -XPOST "${ELASTICSEARCH_URL}/logs-apm.error-default/_rollover" -H 'Content-Type: application/json'
      curl -u "elastic:${ELASTICSEARCH_PASSWORD}" -XPOST "${ELASTICSEARCH_URL}/metrics-apm.app.advertservice-default/_rollover" -H 'Content-Type: application/json'
      curl -u "elastic:${ELASTICSEARCH_PASSWORD}" -XPOST "${ELASTICSEARCH_URL}/metrics-apm.app.cartservice-default/_rollover" -H 'Content-Type: application/json'
      curl -u "elastic:${ELASTICSEARCH_PASSWORD}" -XPOST "${ELASTICSEARCH_URL}/metrics-apm.app.checkoutservice-default/_rollover" -H 'Content-Type: application/json'
      curl -u "elastic:${ELASTICSEARCH_PASSWORD}" -XPOST "${ELASTICSEARCH_URL}/metrics-apm.app.currencyservice-default/_rollover" -H 'Content-Type: application/json'
      curl -u "elastic:${ELASTICSEARCH_PASSWORD}" -XPOST "${ELASTICSEARCH_URL}/metrics-apm.app.emailservice-default/_rollover" -H 'Content-Type: application/json'
      curl -u "elastic:${ELASTICSEARCH_PASSWORD}" -XPOST "${ELASTICSEARCH_URL}/metrics-apm.app.frontend_node-default/_rollover" -H 'Content-Type: application/json'
      curl -u "elastic:${ELASTICSEARCH_PASSWORD}" -XPOST "${ELASTICSEARCH_URL}/metrics-apm.app.newsletter_otel-default/_rollover" -H 'Content-Type: application/json'
      curl -u "elastic:${ELASTICSEARCH_PASSWORD}" -XPOST "${ELASTICSEARCH_URL}/metrics-apm.app.paymentservice-default/_rollover" -H 'Content-Type: application/json'
      curl -u "elastic:${ELASTICSEARCH_PASSWORD}" -XPOST "${ELASTICSEARCH_URL}/metrics-apm.app.productcatalogservice-default/_rollover" -H 'Content-Type: application/json'
      curl -u "elastic:${ELASTICSEARCH_PASSWORD}" -XPOST "${ELASTICSEARCH_URL}/metrics-apm.app.recommendationservice-default/_rollover" -H 'Content-Type: application/json'
      curl -u "elastic:${ELASTICSEARCH_PASSWORD}" -XPOST "${ELASTICSEARCH_URL}/metrics-apm.app.shippingservice-default/_rollover" -H 'Content-Type: application/json'
      curl -u "elastic:${ELASTICSEARCH_PASSWORD}" -XPOST "${ELASTICSEARCH_URL}/metrics-apm.internal-default/_rollover" -H 'Content-Type: application/json'
      curl -u "elastic:${ELASTICSEARCH_PASSWORD}" -XPOST "${ELASTICSEARCH_URL}/traces-apm-default/_rollover" -H 'Content-Type: application/json'
      curl -u "elastic:${ELASTICSEARCH_PASSWORD}" -XPOST "${ELASTICSEARCH_URL}/traces-apm.rum-default/_rollover" -H 'Content-Type: application/json'
      curl -u "elastic:${ELASTICSEARCH_PASSWORD}" -XPOST "${ELASTICSEARCH_URL}/metricbeat-8.2.0/_rollover" -H 'Content-Type: application/json'


      echo "Checking Data is ready"
      while [ $count -lt $MAX_ATTEMPTS ]; do
          num_docs_apm=$(curl -s -u "elastic:${ELASTICSEARCH_PASSWORD}" -XPOST "${ELASTICSEARCH_URL}/traces-*/_count" -H 'Content-Type: application/json' -d'{"query":{"range":{"@timestamp":{"gte":"now-2m"}}}}' | jq '.count')
          num_docs_metricbeat=$(curl -s -u "elastic:${ELASTICSEARCH_PASSWORD}" -XPOST "${ELASTICSEARCH_URL}/metricbeat-*/_count" -H 'Content-Type: application/json' -d'{"query":{"range":{"@timestamp":{"gte":"now-2m"}}}}' | jq '.count')
          num_docs_heartbeat=$(curl -s -u "elastic:${ELASTICSEARCH_PASSWORD}" -XPOST "${ELASTICSEARCH_URL}/heartbeat-*/_count" -H 'Content-Type: application/json' -d'{"query":{"range":{"@timestamp":{"gte":"now-2m"}}}}' | jq '.count')

          if [ $num_docs_apm -gt 0 ] && [ $num_docs_metricbeat -gt 0 ] && [ $num_docs_heartbeat -gt 0 ]; then
              echo "Data ready"
              echo "Changing readonly password"
              curl --silent -XPOST -u elastic:${ELASTICSEARCH_PASSWORD} ${ELASTICSEARCH_URL}/_security/user/readonly/_password -H "Content-Type: application/json" -d '{  "password" : "'"$ELASTICSEARCH_PASSWORD"'"}'

              echo "Testing proxy endpoint https://observe-${DEPLOY_NUM}-reverse.${ENVIRONMENT}.eden.elastic.dev"
              until curl -k -s --fail https://observe-${DEPLOY_NUM}-reverse.${ENVIRONMENT}.eden.elastic.dev > /dev/null
              do
                  if [ $count -eq $MAX_ATTEMPTS ]; then
                      echo "Max Attempts reached"
                      exit 1
                  fi
                  echo "Proxy entry not ready. Retrying..."
                  count=`expr $count + 1`;
                  sleep 5
              done
              echo "Proxy entry ready"
              echo "Waiting for all pods to be ready"
              sleep 30
              echo "Done"
              exit 0
          fi
          if [ $num_docs_apm -eq 0 ]; then
              echo "apm data missing"
          fi
          if [ $num_docs_metricbeat -eq 0 ]; then
              echo "metricbeat data missing"
          fi
          if [ $num_docs_heartbeat -eq 0 ]; then
              echo "heartbeat data missing"
          fi
          echo retrying...;
          sleep 5;
          count=`expr $count + 1`;
      done
      echo "Max Attempts reached"
      exit 1
{{- end }}
