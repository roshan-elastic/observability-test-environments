---
description: Create a k8s package Policy
api: "/api/fleet/package_policies"
method: POST
headers:
  Content-Type: application/json
  kbn-xsrf: true
return_code:
  - 200
  - 409
ignore_errors: true
body: |
  {
    "policy_id": "k8s-integration",
    "package": {
      "name": "kubernetes",
      "version": "1.32.0"
    },
    "name": "kubernetes_policy",
    "id": "kubernetes_policy",
    "description": "",
    "namespace": "default",
    "inputs": {
      "kubelet-kubernetes/metrics": {
        "enabled": true,
        "streams": {
          "kubernetes.container": {
            "enabled": true,
            "vars": {
              "add_metadata": true,
              "bearer_token_file": "/var/run/secrets/kubernetes.io/serviceaccount/token",
              "hosts": [
                "https://${env.NODE_NAME}:10250"
              ],
              "period": "10s",
              "ssl.verification_mode": "none",
              "add_resource_metadata_config": "# add_resource_metadata:\n#   namespace:\n#     include_labels: [\"namespacelabel1\"]\n#   node:\n#     include_labels: [\"nodelabel2\"]\n#     include_annotations: [\"nodeannotation1\"]\n#   deployment: false\n",
              "ssl.certificate_authorities": []
            }
          },
          "kubernetes.node": {
            "enabled": true,
            "vars": {
              "add_metadata": true,
              "bearer_token_file": "/var/run/secrets/kubernetes.io/serviceaccount/token",
              "hosts": [
                "https://${env.NODE_NAME}:10250"
              ],
              "period": "10s",
              "ssl.verification_mode": "none",
              "ssl.certificate_authorities": []
            }
          },
          "kubernetes.pod": {
            "enabled": true,
            "vars": {
              "add_metadata": true,
              "bearer_token_file": "/var/run/secrets/kubernetes.io/serviceaccount/token",
              "hosts": [
                "https://${env.NODE_NAME}:10250"
              ],
              "period": "10s",
              "ssl.verification_mode": "none",
              "ssl.certificate_authorities": [],
              "add_resource_metadata_config": "# add_resource_metadata:\n#   namespace:\n#     include_labels: [\"namespacelabel1\"]\n#   node:\n#     include_labels: [\"nodelabel2\"]\n#     include_annotations: [\"nodeannotation1\"]\n#   deployment: false\n"
            }
          },
          "kubernetes.system": {
            "enabled": true,
            "vars": {
              "add_metadata": true,
              "bearer_token_file": "/var/run/secrets/kubernetes.io/serviceaccount/token",
              "hosts": [
                "https://${env.NODE_NAME}:10250"
              ],
              "period": "10s",
              "ssl.verification_mode": "none",
              "ssl.certificate_authorities": []
            }
          },
          "kubernetes.volume": {
            "enabled": true,
            "vars": {
              "add_metadata": true,
              "bearer_token_file": "/var/run/secrets/kubernetes.io/serviceaccount/token",
              "hosts": [
                "https://${env.NODE_NAME}:10250"
              ],
              "period": "10s",
              "ssl.verification_mode": "none",
              "ssl.certificate_authorities": []
            }
          }
        }
      },
      "kube-state-metrics-kubernetes/metrics": {
        "enabled": true,
        "streams": {
          "kubernetes.state_container": {
            "enabled": true,
            "vars": {
              "add_metadata": true,
              "hosts": [
                "kube-state-metrics:8080"
              ],
              "leaderelection": true,
              "period": "10s",
              "bearer_token_file": "/var/run/secrets/kubernetes.io/serviceaccount/token",
              "ssl.certificate_authorities": [],
              "add_resource_metadata_config": "# add_resource_metadata:\n#   namespace:\n#     include_labels: [\"namespacelabel1\"]\n#   node:\n#     include_labels: [\"nodelabel2\"]\n#     include_annotations: [\"nodeannotation1\"]\n#   deployment: false\n"
            }
          },
          "kubernetes.state_cronjob": {
            "enabled": true,
            "vars": {
              "add_metadata": true,
              "hosts": [
                "kube-state-metrics:8080"
              ],
              "leaderelection": true,
              "period": "10s",
              "bearer_token_file": "/var/run/secrets/kubernetes.io/serviceaccount/token",
              "ssl.certificate_authorities": []
            }
          },
          "kubernetes.state_daemonset": {
            "enabled": true,
            "vars": {
              "add_metadata": true,
              "hosts": [
                "kube-state-metrics:8080"
              ],
              "leaderelection": true,
              "period": "10s",
              "bearer_token_file": "/var/run/secrets/kubernetes.io/serviceaccount/token",
              "ssl.certificate_authorities": []
            }
          },
          "kubernetes.state_deployment": {
            "enabled": true,
            "vars": {
              "add_metadata": true,
              "hosts": [
                "kube-state-metrics:8080"
              ],
              "leaderelection": true,
              "period": "10s",
              "bearer_token_file": "/var/run/secrets/kubernetes.io/serviceaccount/token",
              "ssl.certificate_authorities": []
            }
          },
          "kubernetes.state_job": {
            "enabled": true,
            "vars": {
              "add_metadata": true,
              "hosts": [
                "kube-state-metrics:8080"
              ],
              "leaderelection": true,
              "period": "10s",
              "bearer_token_file": "/var/run/secrets/kubernetes.io/serviceaccount/token",
              "ssl.certificate_authorities": []
            }
          },
          "kubernetes.state_node": {
            "enabled": true,
            "vars": {
              "add_metadata": true,
              "hosts": [
                "kube-state-metrics:8080"
              ],
              "leaderelection": true,
              "period": "10s",
              "bearer_token_file": "/var/run/secrets/kubernetes.io/serviceaccount/token",
              "ssl.certificate_authorities": []
            }
          },
          "kubernetes.state_persistentvolume": {
            "enabled": true,
            "vars": {
              "add_metadata": true,
              "hosts": [
                "kube-state-metrics:8080"
              ],
              "leaderelection": true,
              "period": "10s",
              "bearer_token_file": "/var/run/secrets/kubernetes.io/serviceaccount/token",
              "ssl.certificate_authorities": []
            }
          },
          "kubernetes.state_persistentvolumeclaim": {
            "enabled": true,
            "vars": {
              "add_metadata": true,
              "hosts": [
                "kube-state-metrics:8080"
              ],
              "leaderelection": true,
              "period": "10s",
              "bearer_token_file": "/var/run/secrets/kubernetes.io/serviceaccount/token",
              "ssl.certificate_authorities": []
            }
          },
          "kubernetes.state_pod": {
            "enabled": true,
            "vars": {
              "add_metadata": true,
              "hosts": [
                "kube-state-metrics:8080"
              ],
              "leaderelection": true,
              "period": "10s",
              "bearer_token_file": "/var/run/secrets/kubernetes.io/serviceaccount/token",
              "ssl.certificate_authorities": [],
              "add_resource_metadata_config": "# add_resource_metadata:\n#   namespace:\n#     include_labels: [\"namespacelabel1\"]\n#   node:\n#     include_labels: [\"nodelabel2\"]\n#     include_annotations: [\"nodeannotation1\"]\n#   deployment: false\n"
            }
          },
          "kubernetes.state_replicaset": {
            "enabled": true,
            "vars": {
              "add_metadata": true,
              "hosts": [
                "kube-state-metrics:8080"
              ],
              "leaderelection": true,
              "period": "10s",
              "bearer_token_file": "/var/run/secrets/kubernetes.io/serviceaccount/token",
              "ssl.certificate_authorities": []
            }
          },
          "kubernetes.state_resourcequota": {
            "enabled": true,
            "vars": {
              "add_metadata": true,
              "hosts": [
                "kube-state-metrics:8080"
              ],
              "leaderelection": true,
              "period": "10s",
              "bearer_token_file": "/var/run/secrets/kubernetes.io/serviceaccount/token",
              "ssl.certificate_authorities": []
            }
          },
          "kubernetes.state_service": {
            "enabled": true,
            "vars": {
              "add_metadata": true,
              "hosts": [
                "kube-state-metrics:8080"
              ],
              "leaderelection": true,
              "period": "10s",
              "bearer_token_file": "/var/run/secrets/kubernetes.io/serviceaccount/token",
              "ssl.certificate_authorities": []
            }
          },
          "kubernetes.state_statefulset": {
            "enabled": true,
            "vars": {
              "add_metadata": true,
              "hosts": [
                "kube-state-metrics:8080"
              ],
              "leaderelection": true,
              "period": "10s",
              "bearer_token_file": "/var/run/secrets/kubernetes.io/serviceaccount/token",
              "ssl.certificate_authorities": []
            }
          },
          "kubernetes.state_storageclass": {
            "enabled": true,
            "vars": {
              "add_metadata": true,
              "hosts": [
                "kube-state-metrics:8080"
              ],
              "leaderelection": true,
              "period": "10s",
              "bearer_token_file": "/var/run/secrets/kubernetes.io/serviceaccount/token",
              "ssl.certificate_authorities": []
            }
          }
        }
      },
      "kube-apiserver-kubernetes/metrics": {
        "enabled": true,
        "streams": {
          "kubernetes.apiserver": {
            "enabled": true,
            "vars": {
              "bearer_token_file": "/var/run/secrets/kubernetes.io/serviceaccount/token",
              "hosts": [
                "https://${env.KUBERNETES_SERVICE_HOST}:${env.KUBERNETES_SERVICE_PORT}"
              ],
              "leaderelection": true,
              "period": "30s",
              "ssl.certificate_authorities": [
                "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
              ]
            }
          }
        }
      },
      "kube-proxy-kubernetes/metrics": {
        "enabled": true,
        "streams": {
          "kubernetes.proxy": {
            "enabled": true,
            "vars": {
              "hosts": [
                "localhost:10249"
              ],
              "period": "10s"
            }
          }
        }
      },
      "kube-scheduler-kubernetes/metrics": {
        "enabled": false,
        "streams": {
          "kubernetes.scheduler": {
            "enabled": false,
            "vars": {
              "bearer_token_file": "/var/run/secrets/kubernetes.io/serviceaccount/token",
              "hosts": [
                "https://0.0.0.0:10259"
              ],
              "period": "10s",
              "ssl.verification_mode": "none",
              "scheduler_label_key": "component",
              "scheduler_label_value": "kube-scheduler"
            }
          }
        }
      },
      "kube-controller-manager-kubernetes/metrics": {
        "enabled": false,
        "streams": {
          "kubernetes.controllermanager": {
            "enabled": false,
            "vars": {
              "bearer_token_file": "/var/run/secrets/kubernetes.io/serviceaccount/token",
              "hosts": [
                "https://0.0.0.0:10257"
              ],
              "period": "10s",
              "ssl.verification_mode": "none",
              "controller_manager_label_key": "component",
              "controller_manager_label_value": "kube-controller-manager"
            }
          }
        }
      },
      "events-kubernetes/metrics": {
        "enabled": true,
        "streams": {
          "kubernetes.event": {
            "enabled": true,
            "vars": {
              "period": "10s",
              "add_metadata": true,
              "skip_older": true,
              "leaderelection": true
            }
          }
        }
      },
      "container-logs-filestream": {
        "enabled": true,
        "streams": {
          "kubernetes.container_logs": {
            "enabled": true,
            "vars": {
              "paths": [
                "/var/log/containers/*${kubernetes.container.id}.log"
              ],
              "symlinks": true,
              "containerParserStream": "all",
              "containerParserFormat": "auto",
              "additionalParsersConfig": "# - ndjson:\n#     target: json\n#     ignore_decoding_error: true\n# - multiline:\n#     type: pattern\n#     pattern: '^\\['\n#     negate: true\n#     match: after\n"
            }
          }
        }
      },
      "audit-logs-filestream": {
        "enabled": false,
        "streams": {
          "kubernetes.audit_logs": {
            "enabled": false,
            "vars": {
              "paths": [
                "/var/log/kubernetes/kube-apiserver-audit.log"
              ]
            }
          }
        }
      }
    }
  }
