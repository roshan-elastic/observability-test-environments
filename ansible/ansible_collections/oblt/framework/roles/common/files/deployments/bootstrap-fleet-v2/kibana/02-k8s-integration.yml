---
description: Create a k8s package Policy
api: "/api/fleet/package_policies"
method: POST
headers:
  Content-Type: application/json
  kbn-xsrf: true
return_code:
  - 200
  - 409
ignore_errors: true
body: |
  {
    "policy_id": "k8s-integration",
    "package": {
      "name": "kubernetes",
      "version": "{{ packages_result.json | json_query('[?name==`kubernetes`].version') | first }}"
    },
    "name": "kubernetes_policy",
    "id": "kubernetes_policy",
    "description": "",
    "namespace": "default"
  }
