---
#{% set _integration = (integrations.name | default('elastic_agent')) %}
description: Create a {{ _integration }} package Policy
api: "/api/fleet/package_policies"
method: POST
headers:
  Content-Type: application/json
  kbn-xsrf: true
return_code:
  - 200
  - 409
ignore_errors: true
body: |
  {
    "policy_id": "fleet-agent-policy",
    "package": {
      "name": "{{ _integration }}",
      "version": "{{ packages_result.json | json_query('[?name==`' + _integration + '`].version') | first }}"
    },
    "name": "{{ _integration }}",
    "id": "{{ _integration }}",
    "description": "Integration configured for testing purposes.",
    "namespace": "default"
  }
