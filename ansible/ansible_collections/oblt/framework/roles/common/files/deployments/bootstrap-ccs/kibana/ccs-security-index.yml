---
# Description of what the recipe does.
description: Configure Default indices in the security solution to use CCS
# Path to the REST API call.
api: "api/kibana/settings"
#HTTP method to use it can be GET, POST, PUT, DELETE, ...
method: POST
# HTTP header we need to pass.
headers:
  Content-Type: application/json
  kbn-xsrf: true
  elastic-api-version: 1
# The payload to send to the REST API.
body: |
  {
    "changes": {
      "securitySolution:defaultIndex": [
        "apm-*-transaction*",
        "auditbeat-*",
        "endgame-*",
        "filebeat-*",
        "logs-*",
        "packetbeat-*",
        "traces-apm*",
        "winlogbeat-*",
        "-*elastic-cloud-logs-*",
        "remote_cluster:apm-*-transaction*",
        "remote_cluster:auditbeat-*",
        "remote_cluster:endgame-*",
        "remote_cluster:filebeat-*",
        "remote_cluster:logs-*",
        "remote_cluster:packetbeat-*",
        "remote_cluster:traces-apm*",
        "remote_cluster:winlogbeat-*",
        "remote_cluster:-*elastic-cloud-logs-*"
      ]
    }
  }
# The expected return code.
return_code:
  - 200
ignore_errors: true
