suite: test a deployment
templates:
  - deployment.yaml
release:
  name: foo
  namespace: bar
tests:
  - it: should render the correct container name when scenario is set
    set:
      scenarios:
        - testScenario
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.containers[0].name
          value: scenario

  - it: should render the correct image when scenario is set
    set:
      scenarios:
        - testScenario
      image:
        repository: testRepo
        tag: testTag
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.containers[0].image
          value: testRepo:testTag
      - hasDocuments:
          count: 1

  - it: should render the correct environment variables when scenario is set
    set:
      scenarios:
        - testScenario
      cmdOpts: testCmdOpts
      elasticsearch:
        host: testHost
        username: testUsername
        password: testPassword
    asserts:
      - isKind:
          of: Deployment
      - hasDocuments:
          count: 1
      - equal:
          path: spec.template.spec.containers[0].env[0].name
          value: CMD_OPTS
      - equal:
          path: spec.template.spec.containers[0].env[0].value
          value: testCmdOpts
      - equal:
          path: spec.template.spec.containers[0].env[1].name
          value: ELASTICSEARCH_HOST
      - equal:
          path: spec.template.spec.containers[0].env[1].value
          value: testHost
      - equal:
          path: spec.template.spec.containers[0].env[2].name
          value: ELASTICSEARCH_USERNAME
      - equal:
          path: spec.template.spec.containers[0].env[2].value
          value: testUsername
      - equal:
          path: spec.template.spec.containers[0].env[3].name
          value: ELASTICSEARCH_PASSWORD
      - equal:
          path: spec.template.spec.containers[0].env[3].value
          value: testPassword
      - equal:
          path: spec.template.spec.containers[0].env[4].name
          value: SCENARIO
      - equal:
          path: spec.template.spec.containers[0].env[4].value
          value: testScenario

  - it: should render the correct container name when scenarios are set
    set:
      scenarios:
        - testScenario1
        - testScenario2
        - test_Scenario.ts
    asserts:
      - isKind:
          of: Deployment
      - hasDocuments:
          count: 3
      - equal:
          path: metadata.name
          value: "foo-apm-synthtrace-testscenario1"
        documentIndex: 0
      - equal:
          path: metadata.name
          value: "foo-apm-synthtrace-testscenario2"
        documentIndex: 1
      - equal:
          path: metadata.name
          value: "foo-apm-synthtrace-test-scenario-ts"
        documentIndex: 2
