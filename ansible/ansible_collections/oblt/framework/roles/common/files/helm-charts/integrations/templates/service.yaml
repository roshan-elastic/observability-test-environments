---
{{- if (.Values.packageRegistry).enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "integrations.fullname" . }}-package-registry
  labels:
    {{- include "integrations.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
      name: http
  selector:
    {{- include "integrations.selectorLabels" . | nindent 4 }}
{{- end }}
