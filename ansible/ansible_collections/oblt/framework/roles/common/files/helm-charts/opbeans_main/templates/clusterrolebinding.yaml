---
{{- if .Values.enabled }}
{{- if .Values.serviceAccount.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ template "opbeans.serviceAccountName" . }}-cluster-role-binding
  labels:
    app: "{{ template "opbeans.fullname" . }}"
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    heritage: {{ .Release.Service | quote }}
    release: {{ .Release.Name | quote }}
subjects:
  - kind: ServiceAccount
    name: {{ template "opbeans.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ template "opbeans.serviceAccountName" . }}-cluster-role
  apiGroup: rbac.authorization.k8s.io
{{- end -}}
{{- end -}}
