apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "grafana-prometheus.fullname" . }}-test-connection"
  labels:
    {{- include "grafana-prometheus.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ .Values.prometheus_service_url }}']
  restartPolicy: Never
