{{- if or ((.Values.kibana).agent_policies) ((.Values.kibana).package_policies) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "elastic-agent.fullname" . }}-policies
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "elastic-agent.labels" . | nindent 4 }}
stringData:
  policies.yml: |
    kibana:
      agent_policies:
{{- with .Values.kibana.agent_policies }}
        {{- toYaml . | nindent 8 }}
{{- end }}
      package_policies:
{{- with .Values.kibana.package_policies }}
        {{- toYaml . | nindent 8 }}
{{- end }}
{{ end }}
