---
{{- if .Values.enabled }}
{{- if .Values.serviceAccount.create }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ template "opbeans.serviceAccountName" . }}-role-binding
subjects:
  - kind: ServiceAccount
    name: {{ template "opbeans.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ template "opbeans.serviceAccountName" . }}-role
  apiGroup: rbac.authorization.k8s.io
{{- end -}}
{{- end -}}
