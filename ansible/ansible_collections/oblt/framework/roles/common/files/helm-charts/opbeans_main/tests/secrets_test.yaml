suite: test secrets
templates:
  - secrets.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not deploy the secrets if .Values.enabled is false
    set:
      enabled: false
    asserts:
      - hasDocuments:
          count: 0
  - it: should not deploy the db secret if .Values.db.enabled is false
    set:
      enabled: true
      db.enabled: false
    asserts:
      - hasDocuments:
          count: 1
  - it: should deploy the db secret if .Values.enabled and .Values.db.enabled are true and db.type is mysql
    documentIndex: 0
    set:
      enabled: true
      db.enabled: true
      db.type: mysql
      db.username: test-user
      db.password: test-password
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: test-opbeans-db-creds
      - equal:
          path: stringData.user
          value: test-user
      - equal:
          path: stringData.mysql-root-password
          value: test-password

  - it: should deploy the db secret if .Values.enabled and .Values.db.enabled are true and db.type is postgresql
    documentIndex: 0
    set:
      enabled: true
      db.enabled: true
      db.type: postgresql
      db.username: test-user
      db.password: test-password
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: test-opbeans-db-creds
      - equal:
          path: stringData.user
          value: test-user
      - equal:
          path: stringData.postgres-password
          value: test-password
      - equal:
          path: stringData.password
          value: test-password
      - equal:
          path: stringData.replication-password
          value: test-password
  - it: should always deploy the config secret if .Values.enabled is true
    documentIndex: 1
    set:
      enabled: true
      db.enabled: true
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: test-opbeans-config
  - it: should set APM environment variables if .Values.apm.type is not otel
    documentIndex: 1
    set:
      enabled: true
      db.enabled: true
      apm:
        type: apm
        url: http://apm-server:8200
        serviceVersion: 1.0.0
        apikey: apm-key
        serviceName: apm-service
        environment: production
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData.ELASTIC_APM_JS_SERVER_URL
          value: http://apm-server:8200
      - equal:
          path: stringData.ELASTIC_APM_JS_BASE_SERVER_URL
          value: http://apm-server:8200
      - equal:
          path: stringData.ELASTIC_APM_JS_BASE_SERVICE_VERSION
          value: 1.0.0
      - equal:
          path: stringData.ELASTIC_APM_SERVICE_VERSION
          value: 1.0.0
      - equal:
          path: stringData.ELASTIC_APM_API_KEY
          value: apm-key
      - equal:
          path: stringData.ELASTIC_APM_JS_BASE_SERVICE_NAME
          value: apm-service-frontend
      - equal:
          path: stringData.ELASTIC_APM_JS_SERVICE_NAME
          value: apm-service-frontend
      - equal:
          path: stringData.ELASTIC_APM_SERVICE_NAME
          value: apm-service
      - equal:
          path: stringData.ELASTIC_APM_ENVIRONMENT
          value: production

  - it: should set Otel environment variables if .Values.apm.type is otel
    documentIndex: 1
    set:
      enabled: true
      db.enabled: true
      apm:
        type: otel
        url: http://otel-collector:4317
        serviceVersion: 1.0.0
        apikey: otel-key
        serviceName: otel-service
        environment: production
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData.OTEL_TRACES_EXPORTER
          value: otlp
      - equal:
          path: stringData.OTEL_METRICS_EXPORTER
          value: otlp
      - equal:
          path: stringData.OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://otel-collector:4317
      - equal:
          path: stringData.OTEL_EXPORTER_OTLP_PROTOCOL
          value: grpc
      - equal:
          path: stringData.APM_AGENT_TYPE
          value: opentelemetry
      - equal:
          path: stringData.OTEL_EXPORTER_OTLP_HEADERS
          value: "Authorization=ApiKey otel-key"
      - equal:
          path: stringData.OTEL_RESOURCE_ATTRIBUTES
          value: "service.name=otel-service,deployment.environment=production,service.version=\"1.0.0\""

  - it: should set Otel environment variables if .Values.apm.type is otel and use token
    documentIndex: 1
    set:
      enabled: true
      db.enabled: true
      apm:
        type: otel
        token: otel-token
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData.OTEL_EXPORTER_OTLP_HEADERS
          value: "Authorization=Bearer otel-token"

  - it: should set APM environment variables if .Values.apm.type is otel and use token
    documentIndex: 1
    set:
      enabled: true
      db.enabled: true
      apm:
        type: apm
        token: token
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData.ELASTIC_APM_SECRET_TOKEN
          value: "token"
