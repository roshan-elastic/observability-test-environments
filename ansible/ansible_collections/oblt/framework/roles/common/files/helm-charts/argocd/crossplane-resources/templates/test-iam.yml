---
# https://marketplace.upbound.io/providers/upbound/provider-gcp-cloudplatform
apiVersion: cloudplatform.gcp.upbound.io/v1beta1
kind: ServiceAccount
metadata:
  annotations:
    meta.upbound.io/example-id: cloudplatform/v1beta1/serviceaccountiammember
  labels:
    testing.upbound.io/example-name: service-account-iam-member
  name: service-account-iam-member
spec:
  forProvider:
    displayName: Upbound Example Service Account
  providerConfigRef:
    name: workload-id-providerconfig
---
apiVersion: cloudplatform.gcp.upbound.io/v1beta1
kind: ServiceAccountIAMMember
metadata:
  annotations:
    meta.upbound.io/example-id: cloudplatform/v1beta1/serviceaccountiammember
  labels:
    testing.upbound.io/example-name: service-account-iam-member
  name: service-account-iam-member
spec:
  forProvider:
    member: serviceAccount:service-account-iam-member@elastic-observability.iam.gserviceaccount.com
    role: roles/compute.admin
    serviceAccountIdSelector:
      matchLabels:
        testing.upbound.io/example-name: service-account-iam-member
  providerConfigRef:
    name: workload-id-providerconfig
