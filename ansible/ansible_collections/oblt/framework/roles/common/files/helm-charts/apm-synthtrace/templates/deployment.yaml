{{ if .Values.deployment.enabled }}
{{ if .Values.scenarios }}
{{- $fullname := (include "apm-synthtrace.fullname" .) -}}
{{- $labels := (include "apm-synthtrace.labels" .) -}}
{{- $labelsSelector := (include "apm-synthtrace.selectorLabels" .) -}}
{{- $serviceAccountName := (include "apm-synthtrace.serviceAccountName" .) -}}
{{- range .Values.scenarios }}
{{- $scenario := . }}
{{- $scenarioNormalized := ($scenario | lower | replace "." "-" | replace "_" "-") }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-{{ $scenarioNormalized }}
  labels:
    scenario: {{ $scenario }}
    {{- $labels | nindent 4 }}
spec:
  replicas: {{ $.Values.deployment.replicaCount }}
  selector:
    matchLabels:
      scenario: {{ $scenario }}
      {{- $labelsSelector | nindent 6 }}
  template:
    metadata:
      {{- with $.Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        scenario: {{ $scenario }}
        {{- $labelsSelector | nindent 8 }}
    spec:
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ $serviceAccountName }}
      securityContext:
        {{- toYaml $.Values.podSecurityContext | nindent 8 }}
      volumes:
        - name: run-script
          configMap:
            name: {{ $fullname }}-run-script
            defaultMode: 0777
            items:
              - key: run.sh
                path: run.sh
      containers:
        - name: scenario
          securityContext:
            {{- toYaml $.Values.securityContext | nindent 12 }}
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag | default $.Chart.AppVersion }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          command: ["/bin/bash"]
          args: ["-c", "/scripts/run.sh"]
          env:
            - name: CMD_OPTS
              value: "{{ $.Values.deployment.args }}"
            - name: ELASTICSEARCH_HOST
              value: "{{ ($.Values.elasticsearch).host }}"
            - name: ELASTICSEARCH_USERNAME
              value: "{{ ($.Values.elasticsearch).username }}"
            - name: ELASTICSEARCH_PASSWORD
              value: "{{ ($.Values.elasticsearch).password }}"
            - name: SCENARIO
              value: {{ . | quote }}
            - name: CI
              value: "true"
          volumeMounts:
            - name: run-script
              mountPath: /scripts
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
{{ end }}
{{ end }}
{{- end }}
