---
# yaml-language-server: $schema=./values.schema.json
## @section opbeans Opbeans Ruby Helm chart configuration
opbeans:
  ## @param opbeans.enabled Enable or disable the whole kubernetes deployments, this allow to use it on parent charts.
  enabled: true
  ## @param opbeans.nameOverride Overrides the the Helm Chart name used to naming kubernetes objects, by default `opbeans`.
  nameOverride: ""
  ## @param opbeans.fullnameOverride Overrides the the Helm Chart fullname used to naming kubernetes objects, by default `opbeans`.
  fullnameOverride: ""
  ## @section opbeans.image Docker image settings
  image:
    ## @param opbeans.image.name Name of the Docker image (docker.elastic.co/observability-ci/it_opbeans-frontend_nginx).
    ## @param opbeans.image.tag Tag of the Docker image (latest).
    ## @param opbeans.image.pullPolicy Docker image pull policy (IfNotPresent|Always|Never)
    name: docker.elastic.co/observability-ci/opbeans-ruby
    tag: daily
    pullPolicy: IfNotPresent
  ## @param opbeans.extraEnvVars Array to add extra environment variables
  extraEnvVars:
    ## @skip opbeans.extraEnvVars
    - name: PORT
      value: "3000"
    - name: DATABASE_URL
      value: "postgresql://$(PGUSER):$(PGPASSWORD)@$(PGHOST)/$(PGDATABASE)"
    - name: RAILS_ENV
      value: production
    - name: RAILS_LOG_TO_STDOUT
      value: "1"
  ## @section apm APM configuration settings.
  apm:
    ## @param opbeans.apm.type Type of reporting API [apm|otel|annotations]
    ## @param opbeans.apm.url URL to the APM service.
    ## @param opbeans.apm.token Token to authenticate against the APM service.
    ## @param opbeans.apm.verifyServerCert Enable Certificates verification on TLS connections.
    ## @param opbeans.apm.serviceName Name of the service deploy for the Helm chart (APM spans).
    ## @param opbeans.apm.serviceVersion Version of the service deploy for the Helm chart (APM spans).
    ## @param opbeans.apm.logLevel Level of debug.
    ## @param opbeans.apm.logFile File to debug to.
    ## @param opbeans.apm.inferredSpans Enable inferred spans.
    ## @param opbeans.apm.logCorrelation Enable log correlation.
    ## @param opbeans.apm.transactionRate Configure the APM transaction rate (0.9).
    ## @param opbeans.apm.environment Environment where the service is deployed.
    ## @param opbeans.apm.enabled [boolean,nullable] Enable to send data to the APM service.
    enabled: true
    type: apm
    url: "https://apm.127.0.0.1.ip.es.io"
    token: "SuP3RSeCr3T"
    verifyServerCert: "true"
    serviceName: "opbeans-ruby"
    serviceVersion: "1.0"
    logLevel: "debug"
    logFile: "stderr"
    inferredSpans: "true"
    logCorrelation: "true"
    transactionRate: "0.9"
    environment: "opbeans"
  ## @section db Database settings.
  db:
    ## @param opbeans.db.enabled Enable the database service deploy.
    ## @param opbeans.db.host Database host.
    ## @param opbeans.db.name Database name.
    ## @param opbeans.db.port Database port.
    ## @param opbeans.db.type Database type [mysql|postgresql]
    ## @param opbeans.db.username Database Username.
    ## @param opbeans.db.password Database Password.
    enabled: true
    host: opbeans-ruby-db
    name: opbeans-ruby
    port: 5432
    type: postgresql
    username: elastic
    password: none
  ## @section ingress Ingress settings
  ingress:
    ## @param opbeans.ingress.enabled Enable or disable the ingress resource.
    ## @param opbeans.ingress.certificateIssuer Name of the certificates issuer.
    ## @param opbeans.ingress.host Hostname exposed by the ingress resource.
    ## @param opbeans.ingress.annotations Additional annotation to the ingress resource.
    enabled: true
    certificateIssuer: "letsencrypt-stage"
    host: opbeans-ruby.127.0.0.1.ip.es.io
    ## @skip opbeans.ingress.annotations
    annotations:
      ingress.kubernetes.io/ssl-redirect: "true"
      kubernetes.io/ingress.class: nginx
      kubernetes.io/tls-acme: "true"
      nginx.ingress.kubernetes.io/app-root: /dashboard
      nginx.ingress.kubernetes.io/auth-type: basic
      nginx.ingress.kubernetes.io/auth-secret: elastic-basic-auth
      nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
  ## @section opbeans.redis Redis settings.
  redis:
    ## @param opbeans.redis.url Redis URL.
    url: redis://opbeans-ruby-redis-master:6379
  ## @param opbeans.volumeMounts Volume mounts
  ## ref: https://kubernetes.io/docs/concepts/storage/volumes/
  ## @skip opbeans.volumeMounts
  volumeMounts:
    - name: opbeans-ruby-config-db
      mountPath: /app/config/database.yml
      subPath: database.yml
  ## @param opbeans.volumes Volumes
  ## ref: https://kubernetes.io/docs/concepts/storage/volumes/
  ## @skip opbeans.volumes
  volumes:
    - name: opbeans-ruby-config-db
      configMap:
        name: opbeans-ruby-config-db
## @section postgresql PostgreSQL Helm chart configuration
postgresql:
  ## @param postgresql.fullnameOverride Overrides the the Helm Chart fullname used to naming kubernetes objects, by default `opbeanst`.
  fullnameOverride: "opbeans-ruby-db"
  ## @section postgresql.auth PostgreSQL authentication settings
  auth:
    ## @param postgresql.auth.username Name for a custom user to create
    username: "elastic"
    ## @param postgresql.auth.existingSecret Name of existing secret to use for PostgreSQL credentials. `auth.postgresPassword`, `auth.password`, and `auth.replicationPassword` will be ignored and picked up from this secret. The secret might also contains the key `ldap-password` if LDAP is enabled. `ldap.bind_password` will be ignored and picked from this secret in this case.
    existingSecret: "opbeans-ruby-db-creds"
  ## @section postgresql.primary
  primary:
    ## @param postgresql.primary.persistence.enabled Enable persistence using PVC
    persistence:
      enabled: false

## @section redis Redis Helm chart configuration
redis:
  ## @param redis.fullnameOverride Overrides the the Helm Chart fullname used to naming kubernetes objects, by default `opbeanst`.
  fullnameOverride: "opbeans-ruby-redis"
  ## @param redis.auth.enabled Enable password authentication
  auth:
    enabled: false
  ## @section redis.master Redis master settings
  master:
    ## @section redis.master.resources requests and limits
    ## ref: https://kubernetes.io/docs/user-guide/compute-resources/
    ## @param redis.master.resources.limits.memory The memory limit for the Opbean
    ## @param redis.master.resources.requests.memory The requested memory for the Opbean
    ## @param redis.master.resources.requests.cpu The requested cpu for the Opbean
    resources:
      requests:
        cpu: 0.1
        memory: 256Mi
      limits:
        memory: 512Mi
    ## @section redis.master.persistence Redis replica persistence settings
    persistence:
      ## @param redis.master.persistence.enabled Enable persistence using PVC
      enabled: false
  ## @section redis.replica Redis replica settings
  replica:
    ## @param redis.replica.replicaCount Number of replicas to deploy
    replicaCount: 1
    ## @section redis.replica.resources requests and limits
    ## ref: https://kubernetes.io/docs/user-guide/compute-resources/
    ## @param redis.replica.resources.limits.memory The memory limit for the Opbean
    ## @param redis.replica.resources.requests.memory The requested memory for the Opbean
    ## @param redis.replica.resources.requests.cpu The requested cpu for the Opbean
    resources:
      requests:
        cpu: 0.1
        memory: 256Mi
      limits:
        memory: 512Mi
    ## @section redis.replica.persistence Redis replica persistence settings
    persistence:
      ## @param redis.replica.persistence.enabled Enable persistence using PVC
      enabled: false
