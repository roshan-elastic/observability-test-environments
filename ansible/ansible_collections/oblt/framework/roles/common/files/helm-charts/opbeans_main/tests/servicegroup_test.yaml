suite: test servicegroup
templates:
  - servicegroup.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not deploy the servicegroup if .Values.enabled is false
    set:
      enabled: false
    asserts:
      - hasDocuments:
          count: 0
  - it: should not deploy the servicegroup if .Values.serviceGroup.deploy is false
    set:
      enabled: true
      serviceGroup:
        deploy: false
    asserts:
      - hasDocuments:
          count: 0
  - it: should deploy the servicegroup if .Values.enabled and .Values.serviceGroup.deploy are true
    set:
      enabled: true
      serviceGroup:
        deploy: true
        name: test-servicegroup
        port: 8080
        targetPort: 8080
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: test-servicegroup
      - equal:
          path: metadata.namespace
          value: default
      - equal:
          path: metadata.labels.service-group
          value: test-servicegroup
      - equal:
          path: spec.ports[0].protocol
          value: TCP
      - equal:
          path: spec.ports[0].port
          value: 8080
      - equal:
          path: spec.ports[0].targetPort
          value: 8080
      - equal:
          path: spec.selector.service-group
          value: test-servicegroup
