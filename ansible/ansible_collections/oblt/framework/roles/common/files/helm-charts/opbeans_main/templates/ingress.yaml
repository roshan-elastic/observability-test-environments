---
{{- if .Values.enabled }}
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: "{{ .Values.ingress.certificateIssuer }}"
    ingress.kubernetes.io/ssl-redirect: "true"
    kubernetes.io/ingress.class: nginx
    kubernetes.io/tls-acme: "true"
    nginx.ingress.kubernetes.io/app-root: /dashboard
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: elastic-basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
  {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    app: {{ include "opbeans.fullname" . }}
  name: {{ include "opbeans.fullname" . }}
  namespace: {{ .Release.Namespace }}
spec:
  rules:
  - host: "{{ .Values.ingress.host }}"
    http:
      paths:
      - backend:
          service:
            name: {{ include "opbeans.fullname" . }}
            port:
              number: {{ .Values.opbeans.port }}
        path: /
        pathType: Prefix
{{- if .Values.ingress.tls }}
  tls:
  - hosts:
    - "{{ .Values.ingress.host }}"
    secretName: {{ include "opbeans.fullname" . }}-tls
{{- end }}
{{- end -}}
{{- end -}}
