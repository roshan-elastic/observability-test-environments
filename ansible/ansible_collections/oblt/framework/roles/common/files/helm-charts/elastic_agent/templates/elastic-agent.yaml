---
{{- if or (eq .Values.mode "deployment") (eq .Values.mode "daemonset") }}
apiVersion: apps/v1
kind: {{ if eq .Values.mode "daemonset" }}DaemonSet{{ else }}Deployment{{ end }}
metadata:
  name: {{ include "elastic-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "elastic-agent.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "elastic-agent.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "elastic-agent.labels" . | nindent 8 }}
    spec:
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "elastic-agent.serviceAccountName" . }}
    {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
    {{- end }}
      dnsPolicy: ClusterFirstWithHostNet
      initContainers:
      {{- if or ((.Values.kibana).agent_policies) ((.Values.kibana).package_policies) }}
        - name: init-policies
          image: docker.elastic.co/observability-ci/init-policies:0.0.1
          volumeMounts:
            - name: policies-yaml
              mountPath: /etc/elastic-agent
              readOnly: true
          env:
            {{- tpl (.Files.Get "config/environment-init-policies.yaml" | nindent 12) . }}
      {{- end }}
      containers:
        - name: elastic-agent
          image: "{{ .Values.image.name }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
        {{- with .Values.commandArgs }}
            {{- toYaml . | nindent 12  }}
        {{- end }}
          env:
            {{- tpl (.Files.Get "config/environment-elastic-agent.yaml" | nindent 12) . }}
            {{- tpl (.Files.Get "config/environment-fleet-server.yaml" | nindent 12) . }}
          {{- with .Values.extraEnvs }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
      {{- if or ((.Values.kibana).agent_policies) ((.Values.kibana).package_policies) }}
        - name: policies-yaml
          secret:
            defaultMode: 0640
            secretName: {{ include "elastic-agent.fullname" . }}-policies
      {{- end }}
{{ end }}
