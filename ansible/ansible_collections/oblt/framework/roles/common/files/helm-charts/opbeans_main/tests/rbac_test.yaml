suite: test opbeans RBAC
templates:
  - clusterrole.yaml
  - clusterrolebinding.yaml
  - rolebinding.yaml
  - role.yaml
  - serviceaccount.yaml
release:
  name: foo
  namespace: bar
tests:
  - it: Should not have any cluster roles, roles or role bindings
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0
  - it: Should have cluster roles, roles or role bindings
    set:
      serviceAccount.create: true
    asserts:
      - isKind:
          of: ClusterRole
        template: clusterrole.yaml
      - isKind:
          of: ClusterRoleBinding
        template: clusterrolebinding.yaml
      - isKind:
          of: RoleBinding
        template: rolebinding.yaml
      - isKind:
          of: Role
        template: role.yaml
      - isKind:
          of: ServiceAccount
        template: serviceaccount.yaml
      - equal:
          path: metadata.name
          value: foo-opbeans-cluster-role
        template: clusterrole.yaml
      - equal:
          path: metadata.name
          value: foo-opbeans-cluster-role-binding
        template: clusterrolebinding.yaml
      - equal:
          path: metadata.name
          value: foo-opbeans-role-binding
        template: rolebinding.yaml
      - equal:
          path: metadata.name
          value: foo-opbeans-role
        template: role.yaml
      - equal:
          path: metadata.name
          value: foo-opbeans
        template: serviceaccount.yaml
      - equal:
          path: subjects[0].name
          value: foo-opbeans
        template: clusterrolebinding.yaml
      - equal:
          path: roleRef.name
          value: foo-opbeans-cluster-role
        template: clusterrolebinding.yaml
      - equal:
          path: subjects[0].name
          value: foo-opbeans
        template: rolebinding.yaml
      - equal:
          path: roleRef.name
          value: foo-opbeans-role
        template: rolebinding.yaml

  - it: Should change the name of the service account
    set:
      serviceAccount.create: true
      serviceAccount.name: baz
    asserts:
      - equal:
          path: metadata.name
          value: baz
        template: serviceaccount.yaml
      - equal:
          path: subjects[0].name
          value: baz
        template: clusterrolebinding.yaml
      - equal:
          path: subjects[0].name
          value: baz
        template: rolebinding.yaml

  - it: Should overwrite the name
    set:
      serviceAccount.create: true
      nameOverride: bar
    asserts:
      - equal:
          path: metadata.name
          value: foo-bar-cluster-role
        template: clusterrole.yaml
      - equal:
          path: metadata.name
          value: foo-bar-cluster-role-binding
        template: clusterrolebinding.yaml
      - equal:
          path: metadata.name
          value: foo-bar-role-binding
        template: rolebinding.yaml
      - equal:
          path: metadata.name
          value: foo-bar-role
        template: role.yaml
      - equal:
          path: metadata.name
          value: foo-bar
        template: serviceaccount.yaml
      - equal:
          path: subjects[0].name
          value: foo-bar
        template: clusterrolebinding.yaml
      - equal:
          path: roleRef.name
          value: foo-bar-cluster-role
        template: clusterrolebinding.yaml
      - equal:
          path: subjects[0].name
          value: foo-bar
        template: rolebinding.yaml
      - equal:
          path: roleRef.name
          value: foo-bar-role
        template: rolebinding.yaml

  - it: Should overwrite the full name
    set:
      serviceAccount.create: true
      fullnameOverride: baz
    asserts:
      - equal:
          path: metadata.name
          value: baz-cluster-role
        template: clusterrole.yaml
      - equal:
          path: metadata.name
          value: baz-cluster-role-binding
        template: clusterrolebinding.yaml
      - equal:
          path: metadata.name
          value: baz-role-binding
        template: rolebinding.yaml
      - equal:
          path: metadata.name
          value: baz-role
        template: role.yaml
      - equal:
          path: metadata.name
          value: baz
        template: serviceaccount.yaml
      - equal:
          path: subjects[0].name
          value: baz
        template: clusterrolebinding.yaml
      - equal:
          path: roleRef.name
          value: baz-cluster-role
        template: clusterrolebinding.yaml
      - equal:
          path: subjects[0].name
          value: baz
        template: rolebinding.yaml
      - equal:
          path: roleRef.name
          value: baz-role
        template: rolebinding.yaml
