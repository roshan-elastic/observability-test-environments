---
{{- if .Values.serviceAccount.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ template "elastic-agent.serviceAccountName" . }}-role
  namespace: {{ .Release.Namespace }}
  labels:
    k8s-app: elastic-agent
    app: "{{ template "elastic-agent.fullname" . }}"
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    heritage: {{ .Release.Service | quote }}
    release: {{ .Release.Name | quote }}
rules:
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs: ["get", "create", "update"]
{{- if or (eq .Values.mode "standalone") (eq .Values.mode "deployment-standalone") }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ template "elastic-agent.serviceAccountName" . }}-kubeadm-config
  namespace: {{ .Values.kubeSystemNamespace }}
  labels:
    k8s-app: elastic-agent
rules:
  - apiGroups: [""]
    resources:
      - configmaps
    resourceNames:
      - kubeadm-config
    verbs: ["get"]
{{ end }}
{{ end }}
