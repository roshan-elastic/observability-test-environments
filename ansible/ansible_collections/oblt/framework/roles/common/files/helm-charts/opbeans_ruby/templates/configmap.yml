---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "opbeans.fullname" . }}-config-db
  namespace: {{ .Release.Namespace }}
data:
  database.yml: |-
    default: &default
      adapter: postgresql
      encoding: unicode
      pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
    production:
      url: <%= ENV['DATABASE_URL'] %>
