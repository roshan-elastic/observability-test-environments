---
apiVersion: tf.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: ess-tf
spec:
  # This optional configuration block can be used to inject HCL into any
  # workspace that uses this provider config, for example to setup Terraform
  # providers.
  configuration: |
    terraform {
      required_version = ">= 0.12.29"

      backend "kubernetes" {
        secret_suffix     = "tf-backend"
        namespace         = "{{ .Release.Namespace }}"
        in_cluster_config = true
      }

      required_providers {
        ec = {
          source  = "elastic/ec"
          version = "{{ .Values.ess.ess_terraform_version }}"
        }
      }
    }
    # in terraform.tfvars.json we get from a secret
    variable "ess_apikey" {
      type = string
    }
    variable "ess_region" {
      type = string
    }
    variable "ess_template" {
      type = string
    }

    # provided by helm
    variable "cluster_name" {
      type = string
    }
    variable "ess_stack_pack_version" {
      type = string
    }

    provider "ec" {
      # This value must be set to the Elastic Cloud API endpoint a variable is not allowed
      endpoint = "{{ .Values.ess.ess_endpoint }}"
      insecure = true
      apikey = var.ess_apikey
      verbose = true
    }
  credentials:
    - filename: terraform.tfvars.json
      secretRef:
        key: credentials
        name: oblt-clusters-ess-tf-credentials
        namespace: {{ .Release.Namespace }}
      source: Secret
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: oblt-clusters-ess-tf-credentials
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-store
  target:
    name: oblt-clusters-ess-tf-credentials
    creationPolicy: Owner
  data:
    - secretKey: credentials
      remoteRef:
        key: {{ .Values.ess.ess_credentials }}
