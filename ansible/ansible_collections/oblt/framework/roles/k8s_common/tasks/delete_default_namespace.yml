---
- name: Delete a default namespace
  kubernetes.core.k8s:
    name: "{{ k8s_default_namespace }}"
    api_version: v1
    kind: Namespace
    state: absent

- name: Delete a kube-system namespace
  kubernetes.core.k8s:
    name: "{{ kube_system_namespace }}"
    api_version: v1
    kind: Namespace
    state: absent
