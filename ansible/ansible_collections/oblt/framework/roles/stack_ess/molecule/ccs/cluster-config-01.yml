cluster_name: "oblt-test-{{ cluster_seed }}"
build_dir: "{{ lookup('env', 'MOLECULE_SCENARIO_DIRECTORY') }}/build/cluster-01"
save_secrets: true
deploy_timestamp: foo #always the same to check the idenpotence.
ephemeral_cluster: true
stack:
  mode: "ess"
  template: "elasticsearch"
  target: "staging"
  ess:
    provider: gcp
    region: gcp-us-central1
    elasticsearch:
      zones: 1

ess_not_allow_settings: false
