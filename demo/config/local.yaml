# MegaMart demo – local (Docker Desktop or Kind)

target: local
cluster_provider: kind   # or docker-desktop

# Use defaults for service_count and applications; override if needed
service_count: 8

# Elasticsearch: set via env (ELASTICSEARCH_URL, ELASTICSEARCH_API_KEY) or set below for local run
# Chart key: otelCollector.elasticsearch
otelCollector:
  elasticsearch:
    endpoint: ""   # e.g. https://my-deployment.es.us-central1.gcp.cloud.es.io
    apiKey: ""     # e.g. from ELASTICSEARCH_API_KEY
