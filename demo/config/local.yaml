#!/usr/bin/env bash
# MegaMart demo – run locally (Docker Desktop K8s or Kind)
set -e

REPO_ROOT="$(cd "$(dirname "${BASH_SOURCE[0]}")/.." && pwd)"
DEMO_ROOT="$(cd "$REPO_ROOT/.." && pwd)/demo"
CONFIG="${DEMO_ROOT}/config/local.yaml"
CHART="${DEMO_ROOT}/chart"
NAMESPACE="${NAMESPACE:-megamart}"

# Optional: override Elasticsearch from env
if [[ -n "$ELASTICSEARCH_URL" ]]; then
  export ELASTICSEARCH_URL
fi
if [[ -n "$ELASTICSEARCH_API_KEY" ]]; then
  export ELASTICSEARCH_API_KEY
fi

echo "=== MegaMart demo (local) ==="
echo "Config: $CONFIG"
echo "Namespace: $NAMESPACE"
echo ""

# Check cluster
if ! kubectl cluster-info &>/dev/null; then
  echo "No Kubernetes cluster reachable. Start Docker Desktop K8s or run: kind create cluster"
  exit 1
fi

# Merge env into a temp values file for Elasticsearch (Helm doesn't read env for values)
VALUES_FILE="$CONFIG"
if [[ -n "$ELASTICSEARCH_URL" || -n "$ELASTICSEARCH_API_KEY" ]]; then
  VALUES_FILE=$(mktemp)
  trap "rm -f $VALUES_FILE" EXIT
  cp "$CONFIG" "$VALUES_FILE"
  if [[ -n "$ELASTICSEARCH_URL" ]]; then
    # Use yq if available, else leave as-is (user can set in local.yaml)
    if command -v yq &>/dev/null; then
      yq -i ".otel_collector.exporters.elasticsearch.endpoint = \"$ELASTICSEARCH_URL\"" "$VALUES_FILE" 2>/dev/null || true
    fi
  fi
  if [[ -n "$ELASTICSEARCH_API_KEY" ]]; then
    if command -v yq &>/dev/null; then
      yq -i ".otel_collector.exporters.elasticsearch.api_key = \"$ELASTICSEARCH_API_KEY\"" "$VALUES_FILE" 2>/dev/null || true
    fi
  fi
fi

