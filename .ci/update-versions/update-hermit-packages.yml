---
# yaml-language-server: $schema=https://www.updatecli.io/schema/latest/config.json
name: Update Hermit
scms:
  githubConfig:
    kind: "github"
    spec:
      user: '{{ requiredEnv "GIT_USER" }}'
      email: '{{ requiredEnv "GIT_EMAIL" }}'
      owner: "elastic"
      repository: "observability-test-environments"
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      username: '{{ requiredEnv "GIT_USER" }}'
      branch: "main"
actions:
  chart:
    kind: github/pullrequest
    scmid: githubConfig
    spec:
      labels:
        - "dependencies"
        - "automerge"
targets:
  updateHermit:
    name: "Update Hermit version"
    scmid: githubConfig
    kind: shell
    spec:
      command: bash -l -c .ci/bin/update-hermit-packages.sh
      environments:
        - name: PATH
        - name: HOME
  updateHermitPackages:
    name: "Update Hermit packages"
    scmid: githubConfig
    kind: shell
    spec:
      command: bash -l -c .ci/bin/update-hermit.sh
      environments:
        - name: PATH
        - name: HOME
