---
# yaml-language-server: $schema=https://www.updatecli.io/schema/latest/config.json
name: Update ECK
scms:
  githubConfig:
    kind: "github"
    spec:
      user: '{{ requiredEnv "GIT_USER" }}'
      email: '{{ requiredEnv "GIT_EMAIL" }}'
      owner: "elastic"
      repository: "observability-test-environments"
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      username: '{{ requiredEnv "GIT_USER" }}'
      branch: "main"
actions:
  chart:
    kind: github/pullrequest
    scmid: githubConfig
    spec:
      labels:
        - "dependencies"
        - "automerge"
sources:
  lastECK:
    kind: githubrelease
    spec:
      owner: "elastic"
      repository: "cloud-on-k8s"
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      username: '{{ requiredEnv "GIT_USER" }}'
      versionfilter:
        kind: latest
    transformers:
      - trimprefix: "v"

targets:
  updateECK:
    name: "Update ECK"
    sourceid: lastECK
    scmid: githubConfig
    kind: yaml
    spec:
      file: "ansible/ansible_collections/oblt/framework/roles/stack_eck/defaults/main.yml"
      key: "$.eck_version"
