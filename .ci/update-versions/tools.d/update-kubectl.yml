---
# yaml-language-server: $schema=https://www.updatecli.io/schema/latest/config.json
name: Update kubectl
scms:
  githubConfig:
    kind: "github"
    spec:
      user: '{{ requiredEnv "GIT_USER" }}'
      email: '{{ requiredEnv "GIT_EMAIL" }}'
      owner: "elastic"
      repository: "observability-test-environments"
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      username: '{{ requiredEnv "GIT_USER" }}'
      branch: "main"
actions:
  chart:
    kind: github/pullrequest
    scmid: githubConfig
    spec:
      labels:
        - "dependencies"
        - "automerge"
sources:
  lastkubectl:
    kind: file
    spec:
      file: https://storage.googleapis.com/kubernetes-release/release/stable.txt
    transformers:
      - trimprefix: "v"

targets:
  updateKubectl:
    name: "Update kubectl"
    sourceid: lastkubectl
    scmid: githubConfig
    kind: yaml
    spec:
      file: "ansible/ansible_collections/oblt/framework/roles/tools/defaults/main.yml"
      key: "$.kubectl_version"
