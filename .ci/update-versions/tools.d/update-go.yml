---
# yaml-language-server: $schema=https://www.updatecli.io/schema/latest/config.json
name: Update Go
scms:
  githubConfig:
    kind: "github"
    spec:
      user: '{{ requiredEnv "GIT_USER" }}'
      email: '{{ requiredEnv "GIT_EMAIL" }}'
      owner: "elastic"
      repository: "observability-test-environments"
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      username: '{{ requiredEnv "GIT_USER" }}'
      branch: "main"
actions:
  chart:
    kind: github/pullrequest
    scmid: githubConfig
    spec:
      labels:
        - "dependencies"
        - "automerge"
sources:
  lastGo:
    name: Get Golang version
    kind: golang

targets:
  updateGo:
    name: "Update Go"
    sourceid: lastGo
    scmid: githubConfig
    kind: file
    spec:
      file: ".go-version"
      content: |
        {{ source "lastGo" }}
