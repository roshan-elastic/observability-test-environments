---
# yaml-language-server: $schema=https://www.updatecli.io/schema/latest/config.json
name: Update GKE
scms:
  githubConfig:
    kind: "github"
    spec:
      user: '{{ requiredEnv "GIT_USER" }}'
      email: '{{ requiredEnv "GIT_EMAIL" }}'
      owner: "elastic"
      repository: "observability-test-environments"
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      username: '{{ requiredEnv "GIT_USER" }}'
      branch: "main"
actions:
  chart:
    kind: github/pullrequest
    scmid: githubConfig
    spec:
      labels:
        - "dependencies"
        - "automerge"
sources:
  lastGKE:
    name: "Update GKE version"
    kind: shell
    spec:
      command: make gke-latest-version
      environments:
        - name: PATH
        - name: HOME
        - name: GOOGLE_APPLICATION_CREDENTIALS
conditions:
  isNotEmpty:
    kind: shell
    disablesourceinput: true
    spec:
      command: '[ -n "{{ source "lastGKE" }}" ]'

targets:
  updateGKE:
    name: "Update GKE version"
    sourceid: lastGKE
    scmid: githubConfig
    kind: yaml
    spec:
      file: "ansible/ansible_collections/oblt/framework/roles/k8s_autopilot/defaults/main.yml"
      key: "$.k8s_autopilot_version"
