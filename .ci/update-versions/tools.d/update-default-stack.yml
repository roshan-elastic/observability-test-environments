---
# yaml-language-server: $schema=https://www.updatecli.io/schema/latest/config.json
name: Update Elastic Stack
scms:
  githubConfig:
    kind: "github"
    spec:
      user: '{{ requiredEnv "GIT_USER" }}'
      email: '{{ requiredEnv "GIT_EMAIL" }}'
      owner: "elastic"
      repository: "observability-test-environments"
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      username: '{{ requiredEnv "GIT_USER" }}'
      branch: "main"
actions:
  chart:
    kind: github/pullrequest
    scmid: githubConfig
    spec:
      labels:
        - "dependencies"
        - "automerge"
sources:
  lastElasticStack:
    name: "Update Elastic Stack version"
    kind: shell
    spec:
      command: make stack-version-release
      environments:
        - name: PATH
        - name: HOME
targets:
  updateElasticStack:
    name: "Update Elastic Stack version"
    sourceid: lastElasticStack
    scmid: githubConfig
    kind: yaml
    spec:
      file: "ansible/ansible_collections/oblt/framework/roles/common/defaults/main.yml"
      key: "$.default_stack_version"
