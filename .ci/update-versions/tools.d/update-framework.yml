---
# yaml-language-server: $schema=https://www.updatecli.io/schema/latest/config.json
name: Update Oblt Framework
scms:
  githubConfig:
    kind: "github"
    spec:
      user: '{{ requiredEnv "GIT_USER" }}'
      email: '{{ requiredEnv "GIT_EMAIL" }}'
      owner: "elastic"
      repository: "observability-test-environments"
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      username: '{{ requiredEnv "GIT_USER" }}'
      branch: "main"
actions:
  chart:
    kind: github/pullrequest
    scmid: githubConfig
    spec:
      labels:
        - "dependencies"
        - "automerge"
sources:
  lastObltFramework:
    kind: githubrelease
    spec:
      owner: "elastic"
      repository: "observability-test-environments"
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      username: '{{ requiredEnv "GIT_USER" }}'
      versionfilter:
        kind: latest
    transformers:
      - trimprefix: "v"

targets:
  updateObltFramework:
    name: "Update Oblt Framework"
    sourceid: lastObltFramework
    scmid: githubConfig
    kind: yaml
    spec:
      file: ".github/actions/cluster-target/action.yml"
      key: "$.inputs.frameworkVersion.default"
