---
# yaml-language-server: $schema=https://www.updatecli.io/schema/latest/config.json
name: Update developer cluster {{ requiredEnv "CLUSTER_NAME" }}
scms:
  githubConfig:
    kind: "github"
    spec:
      user: '{{ requiredEnv "GIT_USER" }}'
      email: '{{ requiredEnv "GIT_EMAIL" }}'
      owner: "elastic"
      repository: "observability-test-environments"
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      username: '{{ requiredEnv "GIT_USER" }}'
      branch: "main"
actions:
  elasticStack:
    kind: github/pullrequest
    scmid: githubConfig
    spec:
      mergemethod: squash
      title: '[updatecli][{{ requiredEnv "CLUSTER_NAME" }}] Update Elastic Stack'
      description: '[updatecli][{{ requiredEnv "CLUSTER_NAME" }}] Update Elastic Stack'
      labels:
        - "dependencies"
        - '{{ requiredEnv "CLUSTER_NAME" }}'
        - "elasticStack"
        - "automerge"
        - "skip-changelog"
sources:
  lastVersion:
    name: "Check Elastic Stack version"
    kind: yaml
    spec:
      file: '{{ requiredEnv "REMOTE_CLUSTER_CONFIG_FILE" }}'
      key: '$.stack.version'
      keyonly: true
  lastElasticsearchDockerImage:
    name: "Check Elasticsearch Docker image"
    kind: yaml
    spec:
      file: '{{ requiredEnv "REMOTE_CLUSTER_CONFIG_FILE" }}'
      key: '$.stack.ess.elasticsearch.image'
  lastKibanaDockerImage:
    name: "Check Kibana  Docker image"
    kind: yaml
    spec:
      file: '{{ requiredEnv "REMOTE_CLUSTER_CONFIG_FILE" }}'
      key: '$.stack.ess.kibana.image'
  lastElasticAgentDockerImage:
    name: "Check Elastic Agent Docker image"
    kind: yaml
    spec:
      file: '{{ requiredEnv "REMOTE_CLUSTER_CONFIG_FILE" }}'
      key: '$.stack.ess.integrations.image'
  nowDate:
    name: "Check now date"
    kind: shell
    spec:
      command: date -u +"%Y-%m-%dT%H:%M:%SZ"
      environments:
        - name: PATH
targets:
  updateVersion:
    name: "Update Elastic Stack version"
    scmid: githubConfig
    kind: shell
    disablesourceinput: true
    spec:
      changedif:
        kind: file/checksum
        spec:
          files:
            - 'environments/{{ requiredEnv "CLUSTER_CONFIG_FILE" }}'
      command: |
        KEY="${KEY}" SET_VALUE="${SET_VALUE}" yq -i 'eval(strenv(KEY)) = strenv(SET_VALUE)' $(pwd)/${FILE}
      environments:
        - name: KEY
          value: '.stack.version'
        - name: SET_VALUE
          value: '{{ source "lastVersion" }}'
        - name: FILE
          value: 'environments/{{ requiredEnv "CLUSTER_CONFIG_FILE" }}'
        - name: PATH
  updateElasticsearchDockerImage:
    name: "Update Elasticsearch Docker image"
    scmid: githubConfig
    kind: shell
    disablesourceinput: true
    spec:
      changedif:
        kind: file/checksum
        spec:
          files:
            - 'environments/{{ requiredEnv "CLUSTER_CONFIG_FILE" }}'
      command: |
        KEY="${KEY}" SET_VALUE="${SET_VALUE}" yq -i 'eval(strenv(KEY)) = strenv(SET_VALUE)' $(pwd)/${FILE}
      environments:
        - name: KEY
          value: '.stack.ess.elasticsearch.image'
        - name: SET_VALUE
          value: '{{ source "lastElasticsearchDockerImage" }}'
        - name: FILE
          value: 'environments/{{ requiredEnv "CLUSTER_CONFIG_FILE" }}'
        - name: PATH
  updateKibanaDockerImage:
    name: "Update Kibana Docker image"
    scmid: githubConfig
    kind: shell
    disablesourceinput: true
    spec:
      changedif:
        kind: file/checksum
        spec:
          files:
            - 'environments/{{ requiredEnv "CLUSTER_CONFIG_FILE" }}'
      command: |
        KEY="${KEY}" SET_VALUE="${SET_VALUE}" yq -i 'eval(strenv(KEY)) = strenv(SET_VALUE)' $(pwd)/${FILE}
      environments:
        - name: KEY
          value: '.stack.ess.kibana.image'
        - name: SET_VALUE
          value: '{{ source "lastKibanaDockerImage" }}'
        - name: FILE
          value: 'environments/{{ requiredEnv "CLUSTER_CONFIG_FILE" }}'
        - name: PATH
  updateElasticAgentDockerImage:
    name: "Update Elastic Agent Docker image"
    scmid: githubConfig
    kind: shell
    disablesourceinput: true
    spec:
      changedif:
        kind: file/checksum
        spec:
          files:
            - 'environments/{{ requiredEnv "CLUSTER_CONFIG_FILE" }}'
      command: |
        KEY="${KEY}" SET_VALUE="${SET_VALUE}" yq -i 'eval(strenv(KEY)) = strenv(SET_VALUE)' $(pwd)/${FILE}
      environments:
        - name: KEY
          value: '.stack.ess.integrations.image'
        - name: SET_VALUE
          value: '{{ source "lastElasticAgentDockerImage" }}'
        - name: FILE
          value: 'environments/{{ requiredEnv "CLUSTER_CONFIG_FILE" }}'
        - name: PATH
  updateUpdateAt:
    name: "Update update at"
    scmid: githubConfig
    kind: shell
    disablesourceinput: true
    spec:
      changedif:
        kind: file/checksum
        spec:
          files:
            - 'environments/{{ requiredEnv "CLUSTER_CONFIG_FILE" }}'
      command: |
        KEY="${KEY}" SET_VALUE="${SET_VALUE}" yq -i 'eval(strenv(KEY)) = strenv(SET_VALUE)' $(pwd)/${FILE}
      environments:
        - name: KEY
          value: '.updated_at'
        - name: SET_VALUE
          value: '{{ source "nowDate" }}'
        - name: FILE
          value: 'environments/{{ requiredEnv "CLUSTER_CONFIG_FILE" }}'
        - name: PATH
