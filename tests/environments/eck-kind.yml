---
cluster_name: "{{ lookup('env','CLUSTER_NAME') | default('eck-test-oblt-{{ cluster_seed }}', true) }}"
save_secrets: false
certificate_issuer: letsencrypt-staging
kind_config_file: "{{ build_dir }}/kind/config_single_node-ports.yml"

k8s:
  enabled: true
  provider: kind

stack:
  mode: eck
  version: "{{ default_stack_version }}"
  template: observability
