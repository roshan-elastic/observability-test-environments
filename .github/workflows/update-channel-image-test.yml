---
## Workflow to test the Docker images before to update the update channels file.
name: Update channels Docker image test
on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to run the workflow on'
        required: true
        default: 'main'
  pull_request:
    branches:
      - main
    paths:
      - '.ci/update-versions/update_channels.json'

permissions:
  pull-requests: write
  contents: write

jobs:
  channel-changes:
    runs-on: ubuntu-latest
    outputs:
      changedChannels: ${{ steps.changed-channels.outputs.changedChannels }}
      currentChannels: ${{ steps.changed-channels.outputs.currentChannels }}
      previousChannels: ${{ steps.changed-channels.outputs.previousChannels }}
      dayOfWeek: ${{ steps.changed-channels.outputs.dayOfWeek }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: false

      - uses: ./.github/actions/channel-changes
        id: changed-channels
        with:
          ref: ${{ inputs.ref || github.sha || 'main' }}

  docker-images-stack:
    if: ${{ fromJSON(needs.channel-changes.outputs.changedChannels)[0] != '' }}
    runs-on: ubuntu-latest
    needs:
      - channel-changes
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        channel: ${{ fromJson(needs.channel-changes.outputs.changedChannels) }}
    env:
      CHANNEL: ${{ matrix.channel }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: false
          ref: ${{ inputs.ref || github.sha || 'main' }}

      # IMPORTANT: the secrets below are managed through IASC (contact robots if you need further assistance)
      - name: Log in to the Elastic Container registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ secrets.ELASTIC_DOCKER_REGISTRY }}
          username: ${{ secrets.ELASTIC_DOCKER_USERNAME }}
          password: ${{ secrets.ELASTIC_DOCKER_PASSWORD }}

      - name: "Load update channels"
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const updateChannelsFile = fs.readFileSync(path.join(process.env.GITHUB_WORKSPACE, '.ci', 'update-versions', 'update_channels.json'), 'utf8');
            const updateChannels = JSON.parse(updateChannelsFile);
            const channel = updateChannels[process.env.CHANNEL];

            core.debug(`Channel: ${JSON.stringify(channel)}`);

            const stackVersion = channel.version;
            const stackBuild = channel.build;
            const elasticsearchDockerImage = channel.docker.elasticsearch;
            const kibanaDockerImage = channel.docker.kibana;
            const fleetDockerImage = channel.docker.fleet;
            const parameters = {
              StackVersion: stackVersion,
              ElasticsearchDockerImage: elasticsearchDockerImage,
              KibanaDockerImage: kibanaDockerImage,
              ElasticAgentDockerImage: fleetDockerImage
            };
            fs.writeFileSync(path.join(process.env.GITHUB_WORKSPACE, 'parameters.json'), JSON.stringify(parameters));

            core.exportVariable('STACK_VERSION', stackVersion);
            core.exportVariable('STACK_BUILD', stackBuild);

      - name: "Get Docker images ${{ env.STACK_BUILD }}"
        if: ${{ env.STACK_VERSION != 'serverless' }}
        run: |
          .ci/scripts/getDockerImages.sh "${STACK_VERSION}" 'observability-ci' "${STACK_BUILD}"

      - name: Setup Git
        uses: elastic/oblt-actions/git/setup@v1
        with:
          github-token: ${{ secrets.OBLT_TEST_ENV_GITHUB_TOKEN }}

      - uses: elastic/oblt-actions/oblt-cli/setup@v1
        with:
          slack-channel: '#observablt-bots' # default
          username: 'obltmachine' # default
          github-token: ${{ secrets.OBLT_TEST_ENV_GITHUB_TOKEN }}

      - name: "Test Docker images ${{ env.STACK_BUILD }}"
        if: ${{ env.STACK_VERSION != 'serverless' }}
        env:
          GITHUB_TOKEN: ${{ secrets.OBLT_TEST_ENV_GITHUB_TOKEN }}
        run: |
          oblt-cli cluster create custom \
            --template ess \
            --parameters-file "${PWD}/parameters.json" \
            --wait 15 \
            --cluster-name-prefix "test-images" \
            --output-file "${PWD}/cluster.json" || touch .failed-creation
          if [ ! -f .failed-creation ]; then
            CLUSTER_NAME=$(jq -r '.ClusterName' cluster.json)
            oblt-cli cluster destroy --cluster-name "${CLUSTER_NAME}" --force || true
          else
            echo "Failed to create the cluster"
            exit 1
          fi
