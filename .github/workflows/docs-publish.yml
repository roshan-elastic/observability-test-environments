name: Publish docs
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'environments/mkdocs*.yml'
      - 'environments/**/*.md'
      - 'ansible/**/*.md'

permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          cache: 'pip'
          python-version-file: .python-version
      - uses: actions/cache@v4
        with:
          key: ${{ github.ref }}
          path: .cache
      - run: make -C .ci docs-publish
