---
## Workflow to build, test, and release the oblt-cli.
name: oblt-cli

permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'tools/oblt-cli/**'
      - .github/workflows/oblt-cli.yml
  push:
    branches:
      - "main"
    paths:
      - 'tools/oblt-cli/**'
      - .github/workflows/oblt-cli.yml

jobs:
  lint:
    name: Run linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/no-forks
      - uses: ./.github/actions/prepare-tool
        with:
          # NOTE: it requires to access private github repositories hence
          #       EPHEMERAL_GH_TOKEN is not supported
          token: ${{ secrets.OBLT_CLI_GITHUB_TOKEN }}
          toolPath: tools/oblt-cli
      - name: Lint
        run: make -C tools/oblt-cli lint

  build:
    name: Run Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/prepare-tool
        with:
          # NOTE: it requires to access private github repositories hence
          #       EPHEMERAL_GH_TOKEN is not supported
          token: ${{ secrets.OBLT_CLI_GITHUB_TOKEN }}
          toolPath: tools/oblt-cli
      - name: build
        run: make -C tools/oblt-cli build

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: [lint, build]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/prepare-tool
        with:
          # NOTE: it requires to access private github repositories hence
          #       EPHEMERAL_GH_TOKEN is not supported
          token: ${{ secrets.OBLT_CLI_GITHUB_TOKEN }}
          toolPath: tools/oblt-cli
      - name: test
        run: make -C tools/oblt-cli test
      - uses: actions/upload-artifact@v4
        if: success() || failure()        # run this step even if previous step failed
        with:
          name: test-results-oblt-cli
          path: tools/oblt-cli/**/junit-report.xml

  snapshot:
    name: Run snapshot
    runs-on: ubuntu-latest
    needs: [lint, build]
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/prepare-tool
        with:
          # NOTE: it requires to access private github repositories hence
          #       EPHEMERAL_GH_TOKEN is not supported
          token: ${{ secrets.OBLT_CLI_GITHUB_TOKEN }}
          toolPath: tools/oblt-cli
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # See https://goreleaser.com/blog/supply-chain-security/
      - name: installs syft for generating the SBOM with goreleaser
        uses: anchore/sbom-action/download-syft@v0.17.0

      - run: make -C tools/oblt-cli snapshot

      - name: generate build provenance
        continue-on-error: true
        uses: ./.github/actions/oblt-cli-provenance
