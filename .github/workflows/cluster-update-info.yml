---
# Workflow to update the cluster info of oblt clusters, after open a PR with an Elastic Stack update.
name: Oblt Clusters update cluster info
on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    paths:
      - 'environments/users/robots/**/config-cluster.yml'

permissions:
  contents: read

jobs:
  filter-files:
    runs-on: ubuntu-latest
    concurrency:
      group: "${{ github.ref }}-update-info"
    outputs:
      modified: ${{ steps.filtered-files.outputs.modified }}
      count: ${{ steps.filtered-files.outputs.count }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.sha || 'main' }}
      - uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
          cache: 'pip'
          cache-dependency-path: ansible/requirements.txt
      - run: pip install --no-compile -r ansible/requirements.txt
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323
        with:
          json: true
          files: |
            environments/users/robots/**/config-cluster.yml
      - name: Filter Cluster Config files only
        id: filtered-files
        shell: python
        run: |
          import json
          import os

          modifiedFilesJson = json.loads('${{ steps.changed-files.outputs.modified_files }}')
          with open(os.environ.get('GITHUB_OUTPUT'), "a") as f:
            f.write("modified={}\n".format(json.dumps(modifiedFilesJson)))
            f.write("count={}\n".format(len(modifiedFilesJson)))

  process:
    if: ${{ needs.filter-files.outputs.count > 0 }}
    runs-on: ubuntu-latest
    needs: filter-files
    concurrency:
      group: "${{ github.ref }}-update-info"
    strategy:
      fail-fast: true
      matrix:
        filename: ${{ fromJSON(needs.filter-files.outputs.modified) }}
    env:
      CLUSTER_CONFIG_FILE: "${{ github.workspace }}/${{ matrix.filename }}"
      REPO: "${{ github.event.repository.html_url }}"
      BUILD_DIR: "${{ github.workspace }}/build"
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.sha || 'main' }}

      - name: Read cluster config
        id: cluster-config
        uses: ./.github/actions/cluster-read-config
        with:
          filename: ${{ env.CLUSTER_CONFIG_FILE }}

      - uses: elastic/oblt-actions/git/setup@v1
        if: ${{ steps.cluster-config.outputs.grab_cluster_info == 'true' }}
        with:
          github-token: ${{ secrets.OBLT_TEST_ENV_GITHUB_TOKEN }}
      - uses: actions/setup-go@v6
        if: ${{ steps.cluster-config.outputs.grab_cluster_info == 'true' }}
        with:
          go-version-file: .go-version
          cache: true
          cache-dependency-path: tools/oblt-cli/go.sum

      - name: Update cluster info
        if: ${{ steps.cluster-config.outputs.grab_cluster_info == 'true' }}
        uses: ./.github/actions/cluster-target
        with:
          target: "tasks-cluster-info"
          clusterConfigFile: "${{ env.CLUSTER_CONFIG_FILE }}"
          workloadIdentityProvider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER_ID }}
          serviceAccount: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}
          dockerUsername: ${{ secrets.ELASTIC_DOCKER_USERNAME }}
          dockerPassword: ${{ secrets.ELASTIC_DOCKER_PASSWORD }}
          dockerRegistry: ${{ secrets.ELASTIC_DOCKER_REGISTRY }}
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          buildDir: "${{ env.BUILD_DIR }}"

      - name: Move cluster info file
        if: ${{ steps.cluster-config.outputs.grab_cluster_info == 'true' }}
        env:
          DOCS_FOLDER: ${{ github.workspace }}/docs/oblt-clusters/${{ steps.cluster-config.outputs.cluster_name }}
        run: |
          cp "${BUILD_DIR}/cluster-info.md" "${DOCS_FOLDER}/cluster-info.md"

      - name: Commit and push changes
        if: ${{ steps.cluster-config.outputs.grab_cluster_info == 'true' }}
        env:
          DOCS_FOLDER: ${{ github.workspace }}/docs/oblt-clusters/${{ steps.cluster-config.outputs.cluster_name }}
          CLUSTER_NAME: ${{ steps.cluster-config.outputs.cluster_name }}
          GITHUB_TOKEN: ${{ secrets.OBLT_TEST_ENV_GITHUB_TOKEN }}
        run: |
          export NEW_BRANCH="update/${CLUSTER_NAME}-update-info-${RANDOM}"
          export GIT_FILES="${DOCS_FOLDER}/cluster-info.md"
          export COMMIT_MESSAGE="chore: update ${CLUSTER_NAME} cluster info"
          export GH_EXTRA_ARGS='--label "automerge,skip-changelog"'
          make -C ".ci" commit-changes
