---
## Workflow to create a release for the observability-test-environments project
name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    paths:
      - '.ci/.version'

permissions:
  contents: read

jobs:
  create_release:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    concurrency:
      group: "${{ github.ref }}-tools"
    env:
      DOCKER_CLI_EXPERIMENTAL: "enabled"
      DOCKER_BUILDKIT: 1
      ACTIONS_STEP_DEBUG: true
    steps:
      - uses: actions/checkout@v6
      - run: echo "GO_VERSION=$(cat .go-version)" >> "${GITHUB_ENV}"
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: tools/oblt-cli/go.sum
      - name: version
        id: version
        run: |
          version=$(cat .ci/.version)
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
      - uses: elastic/oblt-actions/git/setup@v1
        with:
          github-token: ${{ secrets.OBLT_TEST_ENV_GITHUB_TOKEN }}
      - uses: release-drafter/release-drafter@v7
        with:
          version: ${{ steps.version.outputs.version }}
          publish: true
        env:
          GITHUB_TOKEN: ${{ secrets.OBLT_TEST_ENV_GITHUB_TOKEN }}

  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
      packages: write
    needs: create_release
    concurrency:
      group: "${{ github.ref }}-tools"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: echo "GO_VERSION=$(cat .go-version)" >> "${GITHUB_ENV}"
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: tools/oblt-cli/go.sum
      - uses: elastic/oblt-actions/git/setup@v1
        with:
          github-token: ${{ secrets.OBLT_TEST_ENV_GITHUB_TOKEN }}
      - run: |
          git fetch --all
          git checkout "$(cat .ci/.version)" -b "$(cat .ci/.version)"
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # IMPORTANT: the secrets below are managed through IASC (contact robots if you need further assistance)
      - name: Log in to the Elastic Container registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ secrets.ELASTIC_DOCKER_REGISTRY }}
          username: ${{ secrets.ELASTIC_DOCKER_USERNAME }}
          password: ${{ secrets.ELASTIC_DOCKER_PASSWORD }}

      # See https://goreleaser.com/blog/supply-chain-security/
      - uses: anchore/sbom-action/download-syft@v0.23.1 # installs syft

      - id: release-step
        run: |
          make -C .ci release-packages
          echo "version=$(cat .ci/.version)" >> "${GITHUB_OUTPUT}"
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.OBLT_CLI_GITHUB_TOKEN }}

      - name: generate build provenance
        continue-on-error: true
        uses: ./.github/actions/oblt-cli-provenance

      - name: Notify
        uses: elastic/oblt-actions/slack/send@v1
        with:
          bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          channel-id: '#observablt-robots'
          message: "New oblt clusters tools release: ${{ steps.release-step.outputs.version }} - <https://github.com/elastic/observability-test-environments/releases/tag/${{ steps.release-step.outputs.version }}|Release notes>"

  framework-collection:
    runs-on: ubuntu-latest
    needs: create_release
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
      - name: Build Ansible Collection
        run: |
          REPO_VERSION="$(cat .ci/.version)"
          COLLECTION_VERSION="$(yq -r .version ansible/ansible_collections/oblt/framework/galaxy.yml)"
          if [ "$REPO_VERSION" != "$COLLECTION_VERSION" ]; then
            echo "Version mismatch between repository and collection"
            echo "undate the file ansible/ansible_collections/oblt/framework/galaxy.yml to match the version in .ci/.version"
            exit 1
          fi
          make -C ansible collection-build
          TAR_FILE="oblt-framework-${REPO_VERSION}.tar.gz"
          echo "gh release download --pattern ${TAR_FILE}" >> "${GITHUB_STEP_SUMMARY}"
          echo "VERSION=${REPO_VERSION}" >> "${GITHUB_ENV}"
          echo "TAR_FILE=${TAR_FILE}" >> "${GITHUB_ENV}"

      - uses: elastic/oblt-actions/git/setup@v1
        with:
          github-token: ${{ secrets.OBLT_CLI_GITHUB_TOKEN }}

      - name: Upload binaries to release
        if: ${{ startsWith(github.event.ref, 'refs/tags/') }}
        run: |
          gh release upload "${VERSION}" "ansible/build/${TAR_FILE}"
