---
name: Docker build and push integrations package registry
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'ansible/ansible_collections/oblt/framework/roles/common/files/deployments/docker/integrations/package-registry/**'
  push:
    branches:
      - main
    paths:
      - 'ansible/ansible_collections/oblt/framework/roles/common/files/deployments/docker/integrations/package-registry/**'

permissions:
  contents: read

concurrency:
  group: "${{ github.ref }}-docker-package-registry"

jobs:
  buildAndPush:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # IMPORTANT: the secrets below are managed through IASC (contact robots if you need further assistance)
      - name: Log in to the Elastic Container registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ secrets.ELASTIC_DOCKER_REGISTRY }}
          username: ${{ secrets.ELASTIC_DOCKER_USERNAME }}
          password: ${{ secrets.ELASTIC_DOCKER_PASSWORD }}
      - run: |
          TARGET_DIR=ansible/ansible_collections/oblt/framework/roles/common/files/deployments/docker/integrations/package-registry
          if [ -n "${PR_NUMBER}" ]; then
          export VERSION=PR${PR_NUMBER}
          fi
          make -C "${TARGET_DIR}" docker-build docker-push
        env:
          PR_NUMBER: ${{ github.event.number }}
