name: Invite user to Robots ESS organization
description: Send invitation to a user to join Robots ESS organization in production, QA, and staging environments.
title: "[invite org]: "
# NOTE: invitation label is required by .github/workflows/cluster-send-invitation-issue.yml
labels: ["cluster", "invitation"]
body:
  - type: markdown
    attributes:
      value: |
        Please Fill the following form to invite a user to Robots ESS organization in production, QA, and staging environments.
        Be member of the Robots organization is required to access the [Observability serverless cluster](https://ela.st/oblt-clusters)

        > [!WARNING]
        > ESS user can not be member of more than one organization, so please make sure that the user is not a member of any other organization.

        > [!WARNING]
        > The Robots organization is full automated with [oblt-cli](https://ela.st/oblt-cli) [oblt-robot](https://ela.st/oblt-robot)
        > the manual deployment will be removed.

        > [!NOTE]
        > The email must be `@elastic.co` or `@elasticsearch.com`, it is possible to use alias (my-name+alias@elasticsearch.com) to allow be in more than one organization.
        > If you never used the `my-name@elasticsearch.com` or `my-name+alias@elasticsearch.com` user, you would have to use the [sign up](https://cloud.elastic.co/registration) process to create a new user in ESS.
        > There are three environments where the Robots ESS organization is deployed, each environment is independent.
        > We send one invitation per environment, you have to accept those you want access to.
        > you need a user for each environment you want to access:
        > - [Production](https://cloud.elastic.co/registration)
        > - [QA](https://console.qa.cld.elstc.co/registration)
        > - [Staging](https://staging.found.no/registration)
  - type: input
    id: email
    attributes:
      label: Email of the user (`@elastic.co` or `@elasticsearch.com`)
      description: Email of the user to be invited to Robots ESS organization
