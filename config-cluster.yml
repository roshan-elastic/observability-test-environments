## @section Serverless
## @descriptionStart
## The Serverless configuration defines the settings for the Serverless deployment.
## @descriptionEnd
## @extra serverless [object] Serverless deployment settings
## @param stack.serverless.region [string] Cloud region, e.g. gcp-us-central1, aws-eu-west-1, azure-eastus2,  (default: aws-eu-west-1)
## @param stack.serverless.elasticsearch.image [string] Docker image for Elasticsearch (optional)
## @param stack.serverless.kibana.image [string] Docker image for Kibana (optional)
## @param stack.serverless.fleet.image [string] Docker image for Fleet (optional)
## @param stack.serverless.cluster [string] ID of the cluster to use for the deployment creation (e.g prd-awsuse1-cp-internal-app-1, qa-awsuse1-cp-internal-app-1)

## @param stack.ess.profiling [object] Configuration for Profiling
## @param stack.ess.profiling.enabled [boolean,nullable] True to enable profiling (default: false)
## @param stack.ess.profiling.image [string] Docker image for profiling (optional)
stack:
  mode: ""
  template: ""
  update_mode: ""
  update_schedule: ""
  observability: true
  target: ""
  package_registry: ""
  eck:
    license: ""
    agent:
      enabled: true
      extra_config: ""
      image: ""
      mem: 2
    elasticsearch:
      enabled: true
      extra_config: ""
      image: ""
      mem: 16
      node_count: 3
      node_storage: 256
    kibana:
      enabled: true
      extra_config: ""
      further_details: ""
      image: ""
      mem: 2
  ess:
    autoscale: true
    ccs_remote_clusters: []
    reset_password: false
    saml_id: "disabled"
    elasticsearch:
      enabled: true
      extra_config: ""
      image: ""
      mem: 16
      zones: 3
    integrations:
      enabled: true
      extra_config: ""
      image: ""
      mem: 2
      zones: 1
    kibana:
      enabled: true
      extra_config: ""
      further_details: ""
      image: ""
      mem: 2
      zones: 1
      open_ai_secret: ""
    profiling:
      enabled: false
      image: ""
    provider: gcp
    region: us-central1-c
    restore_snapshot_from: ""
    restore_snapshot_name: __latest_success__
    template: gcp-io-optimized-v3
    trusted_org: ""
  serverless:
    region: aws-eu-west-1
    cluster: prd-awsuse1-cp-internal-app-1
    elasticsearch:
      image: ""
    kibana:
      image: ""
    fleet:
      image: ""
## @section Applications
## @descriptionStart
## The applications configuration defines which applications to deploy in the cluster.
## @descriptionEnd
## @extra apps [object] Applications to deploy
## @extra apps.helm List of Helm charts to deploy
## @skip apps.helm[0].chart
## @skip apps.helm[0].extra_args
## @skip apps.helm[0].name
## @skip apps.helm[0].namespace
## @skip apps.helm[0].values_file
## @skip apps.helm[0].version
## @param apps.helm[0].chart [string] Chart to deploy
## @param apps.helm[0].extra_args [object] Extra arguments to pass to the Helm install command
## @param apps.helm[0].name [string] Name of the Helm chart
## @param apps.helm[0].namespace [string] Namespace to deploy the chart
## @param apps.helm[0].values_file [string] Values file for the Helm chart
## @param apps.helm[0].version [string] Version of the chart

## @extra apps.k8s List of Kubernetes manifests to deploy
## @skip apps.k8s[0].name
## @skip apps.k8s[0].src
## @param apps.k8s[0].name [string] Name of the Kubernetes manifest
## @param apps.k8s[0].src [string] Source directory for the Kubernetes manifest

apps:
  k8s:
    - name: k8s deploy
      src: "{{ deployment_dir }}/k8s/app"
  helm:
    - name: kube-state-metrics
      chart: "prometheus-community/kube-state-metrics"
      version: "{{ kube_state_metrics_version }}"
      namespace: "{{ k8s_default_namespace }}"
      values_file: "{{ helm_deployment_dir }}/kube-state-metrics/helm-values.yml.j2"
    - name: kubernetes-integration
      values_file: "{{ helm_deployment_dir }}/elastic_agent/autopilot_standalone/helm-values.yml.j2"
      chart: "{{ helm_charts_dir }}/elastic_agent_autopilot"
      namespace: "{{ k8s_default_namespace }}"
      version: 0.1.0
    - name: opbeans-go-standalone
      values_file: "{{ helm_deployment_dir }}/opbeans/opbeans_go_standalone/helm-values.yml.j2"
      chart: "{{ helm_charts_dir }}/opbeans_go_standalone"
      namespace: "{{ k8s_default_namespace }}"
      build_deps: true
      version: 0.1.0

## @section Opbeans
## @descriptionStart
## The Opbeans configuration defines the settings for the Opbeans deployment.
## @descriptionEnd
## @param opbeans.enabled True to deploy Opbeans (default: false)
opbeans:
  enabled: false

## @section Synthetics monitors
## @descriptionStart
## ```yaml
## - id: release-oblt
##   folder: "{{ synthetics_deployments_dir }}/{{ cluster_name }}"
##   locale: "en-US"
##   timezone: "America/Los_Angeles"
##   params:
##     ELASTICSEARCH_URL: "https://elasticsearch.example.com"
##     APM_URL: "https://apm.example.com"
##     KIBANA_URL: "https://kibana.example.com"
##     KIBANA_USERNAME: "elastic"
##     KIBANA_PASSWORD: "changeme"
## ```
## @descriptionEnd
## @extra synthetics_monitors_folders List of Synthetics monitors to deploy
## @param synthetics_monitors_folders[0].id Id of the monitor
## @param synthetics_monitors_folders[0].folder Folder where the monitor is located
## @param synthetics_monitors_folders[0].locale Locale to use for the monitor
## @param synthetics_monitors_folders[0].timezone Timezone to use for the monitor
## @param synthetics_monitors_folders[0].params Parameters to use for the monitor
## @skip synthetics_monitors_folders[0].params
synthetics_monitors_folders:
  - id: ""
    folder: ""
    locale: ""
    timezone: ""
    params: {}

## @param load_balancer_ip Loadbalancer IP to use for the cluster
load_balancer_ip: ""

## @param features
## @descriptionStart
## The features configuration defines the features to deploy in the cluster.
## @descriptionEnd
## @skip features
## @descriptionStart
## List of features to deploy in the cluster.
## The features are a list of objects with the following fields:
##
## * `name`: Name of the feature
## * `enabled`: True to enable the feature
## * `parameters`: Parameters to use for the feature
##
## Each feature define the parameters to use for the feature.
## you can find details about the parameters in the feature documentation.
##
## ```yaml
## features:
##   - name: "feature01"
##     enabled: true
##   - name: "feature02"
##     enabled: true
##     parameter00: "value00"
##     parameter01: "value01"
## ```
## @descriptionEnd
features: []
